// ── CSV Parser ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g,""));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const vals = []; let cur = "", inQ = false;
    for (const c of lines[i]) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur); cur = ""; }
      else cur += c;
    }
    vals.push(cur);
    const row = {};
    headers.forEach((h, idx) => {
      const v = (vals[idx] || "").trim().replace(/^"|"$/g,"");
      if (v === "" || v === "NULL" || v === "null" || v === "NA") row[h] = null;
      else if (!isNaN(v) && v !== "") row[h] = parseFloat(v);
      else row[h] = v;
    });
    rows.push(row);
  }
  return rows;
}

function calcStateAvgs(rows) {
  const avgs = {};
  Object.keys(rows[0] || {}).forEach(k => {
    const vals = rows.map(r => r[k]).filter(v => v !== null && typeof v === "number" && !isNaN(v));
    if (vals.length) avgs[k] = vals.reduce((a,b) => a+b, 0) / vals.length;
  });
  return avgs;
}

function padFIPS(val) {
  if (val === null || val === undefined) return null;
  return String(parseInt(val)).padStart(5,"0");
}

// ── Location detection ─────────────────────────────────────────────────────
function detectLocation(text) {
  const lower = text.toLowerCase();
  for (const [county, fips] of Object.entries(COUNTY_FIPS)) {
    if (lower.includes(county.toLowerCase()+" county") || lower.includes(county.toLowerCase()))
      return { fips, countyName: county };
  }
  for (const [city, fips] of Object.entries(CITY_FIPS)) {
    if (lower.includes(city)) return { fips, countyName: FIPS_COUNTY[fips] };
  }
  return null;
}

function detectTroop(text) {
  const lower = text.toLowerCase();
  if (!/(troop|khp|highway patrol)/.test(lower)) return null;
  const m = lower.match(/troop\s+([a-i])/i);
  if (m) return m[1].toUpperCase();
  return null;
}

function detectTopic(text) {
  const t = text.toLowerCase();
  if (/tract|neighborhood|zip|hotspot|sub.county|where.*burden|where.*highest/.test(t)) return "tract";
  if (/troop|khp|highway patrol/.test(t)) return "troop";
  if (/naloxone|narcan|kit|distribution|gap/.test(t)) return "naloxone";
  if (/fatal|death|died|mortality/.test(t)) return "fatal";
  if (/diagnosis|dx|icd|code|presenting|chief complaint/.test(t)) return "ed";
  if (/polysubstance|combination|combo|co-use|multiple drug/.test(t)) return "polysubstance";
  if (/demographic|age|gender|race|hispanic|youth|teen/.test(t)) return "demographics";
  if (/spike|ears|surge|cluster/.test(t)) return "spikes";
  if (/network|ecosystem|bridge|dominant|polysubstance|combo/.test(t)) return "network";
  if (/trend|cagr|change|year|trajectory|getting worse|improving/.test(t)) return "trends";
  if (/meth|opioid|fentanyl|benzo|cocaine|alcohol|drug|substance/.test(t)) return "drugs";
  if (/intervention|strategy|program|prevention|address|reduce|plan/.test(t)) return "intervention";
  return "core";
}

// ── Formatting ─────────────────────────────────────────────────────────────
function fmt(val, field) {
  if (val === null || val === undefined) return "—";
  if (typeof val === "string") return val;
  if (field && (field.includes("pct_") || field.includes("_cagr") || field.includes("yoy_pct") || field.includes("cagr_2020") || field.includes("cagr_raw"))) {
    const v = Math.abs(val) <= 5 ? val * 100 : val;
    return v.toFixed(1) + "%";
  }
  if (field && (field.includes("per1k") || (field.includes("_rate") && !field.includes("visits")) || field.includes("ratio") || field.includes("gap") || field.includes("density") || field.includes("p_opioid") || field.includes("p_stimulant") || field.includes("confidence"))) {
    return val.toFixed(2);
  }
  return typeof val === "number" ? (val % 1 === 0 ? val.toLocaleString() : val.toFixed(1)) : val;
}

// ── Data summaries ─────────────────────────────────────────────────────────
function buildDxBlock(row, suffix) {
  // suffix = "6yr" or "2425"
  const label = suffix === "6yr" ? "2020–2025" : "2024–25";
  const entries = [1,2,3,4,5].map(i => {
    const code = row[`dx${suffix}_rank${i}`];
    const n    = row[`dx${suffix}_rank${i}_n`];
    if (!code || code === "null" || n === null) return null;
    return `  ${i}. ${code} — ${Math.round(n).toLocaleString()} visits`;
  }).filter(Boolean);
  if (!entries.length) return null;
  return `Top ED Diagnosis Codes (${label}):\n${entries.join("\n")}`;
}

function buildComboBlock(row) {
  const entries = [1,2,3,4,5].map(i => {
    const combo = row[`TopCombo_${i}`];
    const n     = row[`TopCombo_${i}_Incidents`];
    if (!combo || combo === "null" || n === null) return null;
    return `  ${i}. ${combo} — ${Math.round(n).toLocaleString()} incidents`;
  }).filter(Boolean);
  if (!entries.length) return null;
  return `Top Polysubstance Combinations (2020–2025):\n${entries.join("\n")}`;
}

function buildDataSummary(row, topic) {
  const fields = [...new Set([...TOPIC_FIELDS.core, ...(TOPIC_FIELDS[topic] || [])])];

  // Remove paired sub-fields from flat list — they'll be handled in blocks below
  const skipFields = new Set([
    "TopCombo_1","TopCombo_2","TopCombo_3","TopCombo_4","TopCombo_5",
    "TopCombo_1_Incidents","TopCombo_2_Incidents","TopCombo_3_Incidents","TopCombo_4_Incidents","TopCombo_5_Incidents",
    "dx6yr_rank1","dx6yr_rank2","dx6yr_rank3","dx6yr_rank4","dx6yr_rank5",
    "dx6yr_rank1_n","dx6yr_rank2_n","dx6yr_rank3_n","dx6yr_rank4_n","dx6yr_rank5_n",
    "dx2425_rank1","dx2425_rank2","dx2425_rank3","dx2425_rank4","dx2425_rank5",
    "dx2425_rank1_n","dx2425_rank2_n","dx2425_rank3_n","dx2425_rank4_n","dx2425_rank5_n",
  ]);

  const lines = fields.filter(f => !skipFields.has(f)).map(f => {
    const val = row[f];
    const avg = stateAvgs[f];
    const label = FIELD_LABELS[f] || f;
    let line = `${label}: ${fmt(val, f)}`;
    if (avg !== undefined && typeof val === "number") {
      const flag = val > avg * 1.1 ? " ⬆ ABOVE KS AVG" : val < avg * 0.9 ? " ⬇ BELOW KS AVG" : " (near KS avg)";
      line += ` (KS avg: ${fmt(avg, f)}${flag})`;
    }
    return line;
  });

  // Append pre-formatted paired blocks based on topic
  if (["ed","drugs","network","intervention","core"].includes(topic)) {
    const dx6 = buildDxBlock(row, "6yr");
    const dx24 = buildDxBlock(row, "2425");
    if (dx6)  lines.push("\n" + dx6);
    if (dx24) lines.push(dx24);
  }
  if (["drugs","network","polysubstance","intervention","core"].includes(topic)) {
    const combo = buildComboBlock(row);
    if (combo) lines.push("\n" + combo);
  }

  return lines.join("\n");
}

function buildTractSummary(countyFIPS) {
  if (!tractData) return null;
  const countyNum = parseInt(countyFIPS.slice(2)); // strip state prefix → 3-digit county num
  const tracts = tractData.filter(r => r.COUNTY_FIPS !== null && parseInt(r.COUNTY_FIPS) === countyNum);
  if (!tracts.length) return "No census tract data available for this county.";

  const suppressed = tracts.filter(r => r.suppress_small_total === 1 || r.burden_tier === null);
  const active = tracts.filter(r => r.suppress_small_total !== 1 && r.burden_tier !== null);

  // Sort by EB rate descending
  active.sort((a,b) => (b.eb_rate_total_per1k || 0) - (a.eb_rate_total_per1k || 0));
  const top5 = active.slice(0,5);
  const topNaloxone = [...active].sort((a,b) => (b.est_kits_needed_annual_median || 0) - (a.est_kits_needed_annual_median || 0)).slice(0,3);

  let out = `CENSUS TRACT BREAKDOWN FOR THIS COUNTY:\n`;
  out += `Total tracts: ${tracts.length} | Reportable: ${active.length} | Suppressed (small population): ${suppressed.length}\n\n`;

  out += `TOP 5 TRACTS BY OVERDOSE BURDEN (EB-adjusted rate per 1,000):\n`;
  top5.forEach((t,i) => {
    out += `${i+1}. Tract ${t.TRACT_FIPS || t.FIPS}: EB Rate=${fmt(t.eb_rate_total_per1k,"per1k")}, Burden Tier=${t.burden_tier || "—"}, Ecosystem=${t.ecosystem_type || "—"}, Incidents(2020-2025)=${fmt(t.incidents_total,"")}\n`;
  });

  out += `\nTOP 3 TRACTS BY NALOXONE NEED (estimated kits/year, median):\n`;
  topNaloxone.forEach((t,i) => {
    out += `${i+1}. Tract ${t.TRACT_FIPS || t.FIPS}: Kits Needed=${fmt(t.est_kits_needed_annual_median,"")}/yr, Naloxone Gap=${fmt(t.naloxone_gap,"gap")}, Expected Opioid ODs/yr=${fmt(t.expected_opioid_ods_annual,"")}\n`;
  });

  if (suppressed.length) out += `\nNote: ${suppressed.length} tract(s) suppressed due to small counts — data not reportable at tract level.\n`;
  return out;
}

function buildTroopSummary(troopLetter) {
  const troop = KHP_TROOPS[troopLetter];
  if (!troop || !countyData) return null;
  const rows = troop.counties.map(fips => {
    const row = countyData.find(r => padFIPS(r.FIPS) === fips);
    return { fips, name: FIPS_COUNTY[fips] || fips, row };
  });
  const found = rows.filter(r => r.row);
  const missing = rows.filter(r => !r.row);

  let out = `KHP ${troop.name} — ${troop.counties.length} counties:\n\n`;
  found.forEach(({ name, row }) => {
    const suppressed = row.suppress_small_total === 1;
    out += `${name} County: `;
    if (suppressed) {
      out += `[SUPPRESSED — small county, data not reportable] Burden Tier=${row.burden_tier || "—"}\n`;
    } else {
      out += `Incidents(2020-2025)=${fmt(row.incidents_total,"")}, Rate/1k=${fmt(row.rate_total_per1k,"per1k")}, Burden=${row.burden_tier || "—"}, Trend=${row.odmap_trend_flag || "—"}, Top Drug=${row.net_dominant_drug || "—"}\n`;
    }
  });
  if (missing.length) out += `\nNote: No data found for: ${missing.map(r=>r.name).join(", ")}\n`;
  return out;
}

// ── System prompt builder ──────────────────────────────────────────────────
function buildSystemPrompt(row, topic, extra) {
  const county = row.NAME;
  const pop = (row.population_1 || row.POPULATION || 0).toLocaleString();
  const troopLetter = FIPS_TO_TROOP[padFIPS(row.FIPS)];
  const troopName = troopLetter ? KHP_TROOPS[troopLetter].name : "Unknown";

  let extraContext = "";
  if (extra) extraContext = `\n\nADDITIONAL CONTEXT:\n${extra}`;

  return `You are KODA, the Kansas Overdose Data Assistant — an AI analyst built by the CDC Foundation's Overdose Response Strategy (ORS) program for Kansas.

You are speaking with a community partner, public health professional, law enforcement officer, or prevention coalition member about overdose and substance use data for ${county} County, Kansas (population: ${pop}, KHP Troop: ${troopName}).

IMPORTANT DATA NOTES:
- "incidents_total" and drug-specific totals (Opioid, Methamphetamine, etc.) cover the period 2020–2025 from ODMAP
- Annual rates (rate_2020_per1k through rate_2025_per1k) are per 1,000 residents
- Fatal overdose data (F2018_2025_*) covers 2018–2025 from KDHE Vital Statistics
- ED visit data (visits_6yr) covers 2020–2025 from ESSENCE
- CAGR values are expressed as decimals — multiply by 100 for percentage
- Suppressed data means counts were too small to report reliably

COUNTY DATA (${county.toUpperCase()}, 2020–2025 unless noted):
${buildDataSummary(row, topic)}${extraContext}

YOUR ROLE:
- When asked about naloxone needs, ALWAYS provide the specific kit estimates from the data — use the HIGH ESTIMATE as the primary planning figure, reference median as a lower bound. Never hedge or say you can't provide a specific number — the data contains these estimates for exactly this purpose.
- Respond in plain, accessible language with technical details in parentheses where helpful
- Always specify time periods when citing totals (e.g., "20,444 incidents from 2020 to 2025")
- Use specific numbers from the data. Never invent figures.
- Compare to Kansas state average when relevant — flagged above as ABOVE/BELOW KS AVG
- Proactively surface 1–2 insights the user didn't ask about but should know
- When users describe intervention ideas, engage thoughtfully with what the data supports
- Keep responses conversational — 2–4 paragraphs unless detail is needed
- If data is suppressed or unavailable, say so clearly
- End with a short "Worth noting:" line when there's an actionable insight
- You represent ORS and CDC Foundation — professional but approachable

Do not make up data not listed above.`;
}

// ── Rendering ──────────────────────────────────────────────────────────────
function renderMetrics(row, fields) {
  const cards = fields.map(f => {
    const val = row[f];
    if (val === null || val === undefined) return "";
    const avg = stateAvgs[f];
    const isNum = typeof val === "number";
    const isHigh = isNum && avg !== undefined && val > avg * 1.1;
    const isLow  = isNum && avg !== undefined && val < avg * 0.9;
    const compare = isNum && avg !== undefined ? `KS avg: ${fmt(avg, f)}` : "";
    return `<div class="metric-card">
      <div class="label">${FIELD_LABELS[f] || f}</div>
      <div class="value ${isHigh?"high":isLow?"low":""}">${fmt(val,f)}${isHigh?" ▲":isLow?" ▼":""}</div>
      ${compare ? `<div class="compare">${compare}</div>` : ""}
    </div>`;
  }).join("");
  return `<div class="metric-grid">${cards}</div>`;
}

function addMessage(role, html, tag) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  const tagHtml = tag ? `<div class="county-tag">${tag}</div>` : "";
  div.innerHTML = `<div class="avatar">${role==="koda"?"K":"U"}</div><div class="bubble">${tagHtml}${html}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg koda"; div.id = "typing-indicator";
  div.innerHTML = `<div class="avatar">K</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { document.getElementById("typing-indicator")?.remove(); }

function addChips(chips) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg koda";
  div.innerHTML = `<div class="avatar" style="opacity:0">K</div><div class="bubble" style="background:transparent;border:none;padding:4px 0">
    <div class="suggestion-chips">${chips.map(s=>`<button class="chip" onclick="sendChip('${s.replace(/'/g,"&#39;")}')">${s}</button>`).join("")}</div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
window.sendChip = t => {
  // Pre-detect location from chip text so county is set before handleSend
  const detected = detectLocation(t);
  if (detected) { sessionFIPS = detected.fips; sessionCountyName = detected.countyName; }
  document.getElementById("user-input").value = t;
  handleSend();
};

function formatResponse(text) {
  // Remove markdown bold
  text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  const m = text.match(/Worth noting:([\s\S]+?)(?:\n\n|$)/);
  let main = text, worthHtml = "";
  if (m) { main = text.replace(m[0],"").trim(); worthHtml = `<div class="worth-noting"><strong>Worth noting:</strong>${m[1]}</div>`; }
  const paras = main.split(/\n\n+/).filter(p=>p.trim()).map(p=>`<p>${p.trim()}</p>`).join("");
  return paras + worthHtml;
}

// ── Gemini ─────────────────────────────────────────────────────────────────
async function callGemini(prompt) {
  const res = await fetch(GEMINI_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "I wasn't able to generate a response.";
}

// ── Main handler ───────────────────────────────────────────────────────────
async function handleSend() {
  if (isLoading || !countyData) return;
  const input = document.getElementById("user-input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  isLoading = true;
  document.getElementById("send-btn").disabled = true;

  addMessage("user", `<p>${text}</p>`);

  const detected = detectLocation(text);
  if (detected) { sessionFIPS = detected.fips; sessionCountyName = detected.countyName; }

  const topic = detectTopic(text);
  const troopLetter = detectTroop(text);

  addTyping();

  try {
    // No county yet
    if (!sessionFIPS && topic !== "troop") {
      const resp = await callGemini(`The user said: "${text}". They haven't mentioned a Kansas county or city yet. Ask them warmly which county or city they're working in. You are KODA, the Kansas Overdose Data Assistant. Keep it to 2 sentences.`);
      removeTyping();
      addMessage("koda", formatResponse(resp));
      addChips(["I'm from Reno County","I'm from Hutchinson","I'm from Sedgwick County","I'm from Wichita","I'm from Wyandotte County","I'm from Johnson County","I'm from Shawnee County"]);
    }
    // Troop area question
    else if (topic === "troop") {
      let tLetter = troopLetter;
      // If they mentioned a county, find its troop
      if (!tLetter && sessionFIPS) tLetter = FIPS_TO_TROOP[sessionFIPS];
      if (!tLetter) {
        removeTyping();
        addMessage("koda", `<p>I can break down overdose data by KHP Troop area. Kansas has Troops A through I. Which troop are you interested in, or tell me your county and I'll identify the troop automatically?</p>`);
        addChips(["Troop A – Topeka area","Troop B – Salina area","Troop D – Wichita area","Troop F – Topeka Metro","Troop G – Garden City area","Troop I – Liberal area"]);
      } else {
        const troopSummary = buildTroopSummary(tLetter);
        const troopPrompt = `You are KODA, the Kansas Overdose Data Assistant.

The user asked about KHP ${KHP_TROOPS[tLetter].name} overdose data.

${troopSummary}

Summarize the overdose landscape across these counties in 3–4 paragraphs. Highlight which counties have the highest burden, note any that are suppressed, identify dominant drug trends, and call out any counties with notable trends. End with a "Worth noting:" insight about the troop area overall. Be specific with numbers.`;
        const aiText = await callGemini(troopPrompt);
        removeTyping();
        addMessage("koda", formatResponse(aiText), `KHP ${KHP_TROOPS[tLetter].name}`);
        addChips(["Which county in this troop has the highest burden?","Tell me about naloxone needs across this troop","What are the dominant drugs in this troop area?"]);
      }
    }
    // County-level question
    else {
      const row = countyData.find(r => padFIPS(r.FIPS) === sessionFIPS);
      if (!row) {
        removeTyping();
        addMessage("koda", `<p>I couldn't find data for ${sessionCountyName} County. Please try again or contact ORS for support.</p>`);
      } else {
        // Tract drill-down
        let extra = null;
        if (topic === "tract") extra = buildTractSummary(sessionFIPS);

        const sysPrompt = buildSystemPrompt(row, topic, extra);
        const aiText = await callGemini(sysPrompt + "\n\nUser message: " + text);
        removeTyping();

        let html = formatResponse(aiText);
        if (detected) html += renderMetrics(row, KEY_DISPLAY_FIELDS);
        addMessage("koda", html, sessionCountyName);
        addChips([
          "Where is overdose burden highest within this county?",
          "What drugs are driving overdoses here?",
          "What does our naloxone gap look like?",
          "Tell me about fatal overdoses in our county",
          "What intervention strategies fit our data profile?",
          "Break down overdoses by KHP troop area"
        ]);
      }
    }
  } catch(e) {
    removeTyping();
    addMessage("koda", `<p>I ran into an error: ${e.message}. Please try again in a moment.</p>`);
  }

  isLoading = false;
  document.getElementById("send-btn").disabled = false;
  document.getElementById("user-input").focus();
}

document.getElementById("send-btn").addEventListener("click", handleSend);
document.getElementById("user-input").addEventListener("keydown", e => { if(e.key==="Enter") handleSend(); });

// ── Startup ────────────────────────────────────────────────────────────────
async function init() {
  try {
    const setMsg = m => document.querySelector("#loading-screen .load-msg").textContent = m;

    setMsg("Loading county data…");
    const [cRes, tRes] = await Promise.all([fetch(COUNTY_CSV_URL), fetch(TRACT_CSV_URL)]);
    if (!cRes.ok) throw new Error(`County CSV error (${cRes.status})`);
    if (!tRes.ok) throw new Error(`Tract CSV error (${tRes.status})`);

    setMsg("Parsing county data…");
    const cText = await cRes.text();
    const allCounties = parseCSV(cText);
    countyData = allCounties.filter(r => r.STATE_ABBR === "KS");
    if (!countyData.length) throw new Error("No Kansas county records found");
    stateAvgs = calcStateAvgs(countyData);

    setMsg("Parsing tract data…");
    const tText = await tRes.text();
    tractData = parseCSV(tText);

    document.getElementById("loading-screen").style.display = "none";

    addMessage("koda",`<p>Hi, I'm <strong>KODA</strong> — the Kansas Overdose Data Assistant, built by the CDC Foundation's Overdose Response Strategy program.</p>
<p>I have county-level and census tract-level overdose surveillance data for all of Kansas — including EMS incidents (2020–2025), emergency department visits, fatal overdoses (2018–2025), naloxone distribution, drug trends, spike events, and more. I can compare any county to the Kansas state average, break down overdose patterns by KHP Troop area, and drill into census tract hotspots within a county.</p>
<p>Tell me which county or city you're working in and what you'd like to understand.</p>`);

    addChips(["Give me an overview of Reno County","Tell me about stimulant trends in Sedgwick County","What is Wyandotte County's drug ecosystem?","Break down overdoses by KHP Troop area","Where is burden highest within Sedgwick County?"]);

  } catch(e) {
    document.getElementById("loading-screen").innerHTML = `
      <div class="logo">KODA</div>
      <div class="load-msg" style="color:#f87171;text-align:center;padding:0 24px">Error loading data: ${e.message}<br><br>Please refresh to try again.</div>`;
  }
}

init();
</script>
