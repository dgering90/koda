* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #E7E9EC; color: #232D2E; height: 100vh; display: flex; flex-direction: column; }
header { background: #325379; color: white; padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; border-bottom: 3px solid #F3C108; }
header .logo { font-size: 22px; font-weight: 700; letter-spacing: 0.08em; color: #76ACC1; }
header .logo span { color: #F3C108; margin-right: 6px; }
header .subtitle { font-size: 12px; color: #BCD4DE; line-height: 1.4; }
header .ors-badge { margin-left: auto; font-size: 10px; background: rgba(118,172,193,0.2); border: 1px solid #76ACC1; padding: 4px 10px; border-radius: 20px; color: #BCD4DE; letter-spacing: 0.05em; }
#chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { display: flex; gap: 12px; max-width: 860px; }
.msg.user { flex-direction: row-reverse; align-self: flex-end; }
.msg.user .bubble { background: #325379; color: white; border-radius: 18px 18px 4px 18px; }
.msg.koda .bubble { background: white; border: 1px solid #BFCDDF; border-radius: 18px 18px 18px 4px; }
.bubble { padding: 12px 16px; font-size: 14px; line-height: 1.7; max-width: 740px; }
.bubble p { margin-bottom: 10px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble .worth-noting { background: #E5EEF1; border-left: 3px solid #488286; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-top: 10px; font-size: 13px; color: #325379; }
.bubble strong { font-weight: 700; }
.avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin-top: 2px; }
.msg.koda .avatar { background: #325379; color: #76ACC1; }
.msg.user .avatar { background: #76ACC1; color: #325379; }
.typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
.typing span { width: 7px; height: 7px; background: #628496; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; margin-top: 12px; }
.metric-card { background: #E5EEF1; border-radius: 6px; padding: 10px 12px; border: 1px solid #BFCDDF; }
.metric-card .label { font-size: 10px; color: #628496; margin-bottom: 3px; line-height: 1.3; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
.metric-card .value { font-size: 16px; font-weight: 700; color: #325379; }
.metric-card .value.high { color: #c0392b; }
.metric-card .value.low { color: #488286; }
.metric-card .compare { font-size: 10px; color: #628496; margin-top: 2px; }
.suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.chip { padding: 6px 14px; border-radius: 20px; border: 1px solid #76ACC1; background: white; font-size: 12px; color: #325379; cursor: pointer; transition: all 0.15s; }
.chip:hover { background: #325379; color: white; border-color: #325379; }
#input-area { padding: 16px 24px; background: white; border-top: 2px solid #BFCDDF; flex-shrink: 0; }
#input-row { display: flex; gap: 10px; max-width: 860px; margin: 0 auto; }
#user-input { flex: 1; padding: 12px 16px; border: 1px solid #BFCDDF; border-radius: 24px; font-size: 14px; outline: none; font-family: Arial, sans-serif; color: #232D2E; }
#user-input:focus { border-color: #325379; }
#send-btn { padding: 12px 22px; background: #325379; color: white; border: none; border-radius: 24px; font-size: 14px; font-weight: 700; cursor: pointer; }
#send-btn:hover { background: #488286; }
#send-btn:disabled { opacity: 0.4; cursor: default; }
.disclaimer { font-size: 11px; color: #628496; text-align: center; margin-top: 8px; max-width: 860px; margin-left: auto; margin-right: auto; }
.county-tag { display: inline-block; background: #BCD4DE; color: #325379; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-bottom: 6px; font-weight: 700; }
#loading-screen { position: fixed; inset: 0; background: #325379; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; }
#loading-screen .logo { font-size: 36px; font-weight: 700; color: #76ACC1; letter-spacing: 0.08em; }
#loading-screen .logo span { color: #F3C108; }
#loading-screen .load-msg { color: #BCD4DE; font-size: 14px; }
#loading-screen .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #76ACC1; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.chart-wrapper { margin-top: 14px; background: white; border: 1px solid #BFCDDF; border-radius: 8px; padding: 14px; }
.chart-title { font-size: 12px; font-weight: 700; color: #325379; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }
.chart-source { font-size: 10px; color: #628496; margin-top: 6px; }
.chart-export-btn { margin-top: 8px; padding: 5px 12px; background: #325379; color: white; border: none; border-radius: 20px; font-size: 11px; cursor: pointer; font-family: Arial, sans-serif; font-weight: 700; }
.chart-export-btn:hover { background: #488286; }
.tract-map { width: 100%; height: 320px; border-radius: 6px; margin-top: 12px; border: 1px solid #BFCDDF; }
.map-legend { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
.map-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #628496; }
.map-legend-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
.map-title { font-size: 12px; font-weight: 700; color: #325379; margin-top: 12px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.map-export-btn { margin-top: 8px; padding: 6px 14px; background: #325379; color: white; border: none; border-radius: 20px; font-size: 12px; cursor: pointer; font-family: Arial, sans-serif; font-weight: 700; }

// ── CSV Parser ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  var lines = text.split(/\r?\n/);
  if (lines.length < 2) return [];
  var headers = lines[0].split(",").map(function(h) { return h.trim().replace(/^"|"$/g,""); });
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = [], cur = "", inQ = false;
    for (var ci = 0; ci < lines[i].length; ci++) {
      var c = lines[i][ci];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur); cur = ""; }
      else cur += c;
    }
    vals.push(cur);
    var row = {};
    headers.forEach(function(h, idx) {
      var v = (vals[idx] || "").trim().replace(/^"|"$/g,"");
      if (v === "" || v === "NULL" || v === "null" || v === "NA") row[h] = null;
      else if (!isNaN(v) && v !== "") row[h] = parseFloat(v);
      else row[h] = v;
    });
    rows.push(row);
  }
  return rows;
}

function calcStateAvgs(rows) {
  var avgs = {};
  if (!rows.length) return avgs;
  Object.keys(rows[0]).forEach(function(k) {
    var vals = rows.map(function(r) { return r[k]; }).filter(function(v) { return v !== null && typeof v === "number" && !isNaN(v); });
    if (vals.length) avgs[k] = vals.reduce(function(a,b) { return a+b; }, 0) / vals.length;
  });
  return avgs;
}

function padFIPS(val) {
  if (val === null || val === undefined) return null;
  return String(parseInt(val)).padStart(5,"0");
}

// ── Peer county matching ───────────────────────────────────────────────────
function getPeerCounties(fips, n) {
  n = n || 4;
  if (!countyData) return [];
  var row = countyData.find(function(r) { return padFIPS(r.FIPS) === fips; });
  if (!row) return [];

  var pop = row.population_1 || row.POPULATION || 0;
  var burden = row.burden_tier || "";
  var eco = row.ecosystem_type || "";
  var neighbors = ADJACENCY[fips] || [];

  var scored = countyData.filter(function(r) {
    return padFIPS(r.FIPS) !== fips && r.suppress_small_total !== 1;
  }).map(function(r) {
    var rfips = padFIPS(r.FIPS);
    var score = 0;
    var rpop = r.population_1 || r.POPULATION || 0;
    // Population similarity (within 50%)
    if (pop > 0 && Math.abs(rpop - pop) / pop < 0.5) score += 3;
    else if (pop > 0 && Math.abs(rpop - pop) / pop < 1.0) score += 1;
    // Burden tier match
    if (r.burden_tier && r.burden_tier === burden) score += 2;
    // Ecosystem match
    if (r.ecosystem_type && r.ecosystem_type === eco) score += 2;
    // Geographic neighbor
    if (neighbors.indexOf(rfips) >= 0) score += 2;
    return { row: r, score: score, fips: rfips };
  });

  scored.sort(function(a,b) { return b.score - a.score; });
  return scored.slice(0, n).map(function(s) { return s.row; });
}

// ── Detection ──────────────────────────────────────────────────────────────
function detectLocation(text) {
  var lower = text.toLowerCase();
  var counties = Object.entries(COUNTY_FIPS);
  for (var i = 0; i < counties.length; i++) {
    var county = counties[i][0], fips = counties[i][1];
    if (lower.includes(county.toLowerCase() + " county") || lower.includes(county.toLowerCase()))
      return { fips: fips, countyName: county };
  }
  var cities = Object.entries(CITY_FIPS);
  for (var j = 0; j < cities.length; j++) {
    if (lower.includes(cities[j][0])) return { fips: cities[j][1], countyName: FIPS_COUNTY[cities[j][1]] };
  }
  return null;
}

function detectTroop(text) {
  var m = text.toLowerCase().match(/troop\s+([a-h])\b/i);
  return m ? m[1].toUpperCase() : null;
}

function detectTopic(text) {
  var t = text.toLowerCase();
  if (/tract|neighborhood|hotspot|sub.county|where.*burden|where.*highest|census/.test(t)) return "tract";
  if (/troop|khp|highway patrol/.test(t)) return "troop";
  if (/diagnosis|dx|icd|code|presenting/.test(t)) return "ed";
  if (/polysubstance|combination|combo|co-use|multiple drug/.test(t)) return "polysubstance";
  if (/naloxone|narcan|kit|distribution|gap/.test(t)) return "naloxone";
  if (/fatal|death|died|mortality/.test(t)) return "fatal";
  if (/ed |emergency|hospital|essence|visit/.test(t)) return "ed";
  if (/demographic|age|gender|race|hispanic|youth|teen/.test(t)) return "demographics";
  if (/spike|ears|surge|cluster/.test(t)) return "spikes";
  if (/network|ecosystem|bridge|dominant/.test(t)) return "network";
  if (/trend|cagr|change|year|trajectory|getting worse|improving/.test(t)) return "trends";
  if (/meth|opioid|fentanyl|benzo|cocaine|alcohol|drug|substance/.test(t)) return "drugs";
  if (/intervention|strategy|program|prevention|address|abatement|reduce|plan|fund/.test(t)) return "intervention";
  return "core";
}

// ── Format helpers ─────────────────────────────────────────────────────────
function fmt(val, field) {
  if (val === null || val === undefined) return "--";
  if (typeof val === "string") return val;
  if (field && (field.includes("pct_") || field.includes("_cagr") || field.includes("yoy_pct") || field.includes("cagr_2020") || field.includes("cagr_raw"))) {
    var v = Math.abs(val) <= 5 ? val * 100 : val;
    return v.toFixed(1) + "%";
  }
  if (field && (field.includes("per1k") || (field.includes("_rate") && !field.includes("visits")) || field.includes("ratio") || field.includes("gap") || field.includes("density") || field.includes("p_opioid") || field.includes("p_stimulant") || field.includes("confidence"))) {
    return val.toFixed(2);
  }
  return typeof val === "number" ? (val % 1 === 0 ? val.toLocaleString() : val.toFixed(1)) : val;
}

function safeVal(v) { return (v === null || v === undefined || isNaN(v)) ? 0 : v; }

function buildDxBlock(row, suffix) {

    if (code && n !== null) entries.push("  " + i + ". " + code + " -- " + Math.round(n).toLocaleString() + " visits");
  }
  return entries.length ? "Top ED Diagnosis Codes (" + label + "):\n" + entries.join("\n") : null;
}

function buildComboBlock(row) {

// Naloxone tract map — colored by kit need
async function renderNaloxoneMap(countyFIPS, countyName) {
  var countyNum=parseInt(countyFIPS.slice(2)), stateNum=countyFIPS.slice(0,2);
  var tracts=tractData?tractData.filter(function(r){return r.COUNTY_FIPS!==null&&parseInt(r.COUNTY_FIPS)===countyNum&&r.suppress_small_total!==1;}):[];
  if(!tracts.length) return null;

  // Build lookup
  var tractLookup={};
  tracts.forEach(function(t){
    var id=String(parseInt(t.TRACT_FIPS||0)).padStart(6,"0");
    tractLookup[id]=t; tractLookup[String(parseInt(t.TRACT_FIPS||0))]=t;
  });

  // Determine color scale based on kit need
  var kits=tracts.map(function(t){return t.est_kits_needed_annual_median||0;}).filter(function(v){return v>0;});
  var maxKits=kits.length?Math.max.apply(null,kits):1;

  function getNaloxoneColor(val) {
    if(!val||val===0) return "#E5EEF1";
    var ratio=val/maxKits;
    if(ratio>0.75) return "#7b0d0d";
    if(ratio>0.5)  return "#c0392b";
    if(ratio>0.25) return "#e67e22";
    return "#f1c40f";
  }

  var mapId="map-"+(++mapCounter), wrapperId="mw-"+mapId;
  var wrapper=document.createElement("div"); wrapper.id=wrapperId;
  var legendItems=[["Highest Need","#7b0d0d"],["High Need","#c0392b"],["Moderate Need","#e67e22"],["Lower Need","#f1c40f"],["Minimal/No Data","#E5EEF1"]];
  wrapper.innerHTML='<div class="map-title">Naloxone Kit Need by Census Tract -- '+countyName+' County (estimated kits/year)</div>'+
    '<div id="'+mapId+'" class="tract-map"></div>'+
    '<div class="map-legend">'+legendItems.map(function(i){return'<div class="map-legend-item"><div class="map-legend-swatch" style="background:'+i[1]+'"></div>'+i[0]+'</div>';}).join("")+'</div>'+
    '<div class="chart-source">Source: ODMAP 2020-2025 | Kansas ORS -- Kit estimates based on opioid incident burden and naloxone gap methodology</div>'+
    '<button class="map-export-btn" onclick="exportChart(\''+wrapperId+'\',\''+countyName+'_Naloxone_Need_Map\')">&#8681; Download Map</button>';

  wrapper._initMap=async function(){
    try{
      var geoRes=await fetch("https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_Census2020/MapServer/8/query?where=STATE%3D'"+stateNum+"'+AND+COUNTY%3D'"+String(countyNum).padStart(3,"0")+"'&outFields=TRACT,GEOID&f=geojson&outSR=4326");
      var geo=await geoRes.json();
      if(!geo.features||!geo.features.length) return;
      var map=L.map(mapId,{zoomControl:true,attributionControl:false});
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",{maxZoom:14}).addTo(map);
      var layer=L.geoJSON(geo,{
        style:function(f){
          var raw=String(parseInt(f.properties.TRACT)),pad=raw.padStart(6,"0");
          var t=tractLookup[pad]||tractLookup[raw];
          var color=t?getNaloxoneColor(t.est_kits_needed_annual_median):"#E5EEF1";
          return{fillColor:color,weight:1,color:"#fff",fillOpacity:0.85};
        },
        onEachFeature:function(f,lyr){
          var raw=String(parseInt(f.properties.TRACT)),pad=raw.padStart(6,"0");
          var t=tractLookup[pad]||tractLookup[raw];
          if(t) lyr.bindPopup("<strong>Tract "+f.properties.TRACT+"</strong><br/>"+
            "Kits Needed/yr (median): "+fmt(t.est_kits_needed_annual_median,"")+"<br/>"+
            "Kits Needed/yr (high): "+fmt(t.est_kits_needed_annual_high,"")+"<br/>"+
            "Naloxone Gap: "+fmt(t.naloxone_gap,"gap")+"<br/>"+
            "Expected Opioid ODs/yr: "+fmt(t.expected_opioid_ods_annual,"")+"<br/>"+
            "Burden: "+(t.burden_tier||"--"));
        }
      }).addTo(map);
      map.fitBounds(layer.getBounds(),{padding:[10,10]});
    }catch(e){var el=document.getElementById(mapId);if(el)el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px">Map unavailable</div>';}
  };
  return wrapper;
}
  var charts = [];
  if (topic === "trends") {
    charts.push(buildTrendChart(row, peers));
  } else if (topic === "drugs") {
    charts.push(buildDrugChart(row));
    charts.push(buildDrugDonut(row));
  } else if (topic === "polysubstance") {
    charts.push(buildComboDonut(row));
    charts.push(buildDrugDonut(row));
  } else if (topic === "fatal") {
    charts.push(buildFatalTrendChart(row));
  } else if (topic === "spikes") {
    charts.push(buildSpikeChart(row));
  } else if (topic === "naloxone") {
    charts.push(buildComparisonChart(row, ["naloxone_opioid_total","naloxone_gap","est_kits_needed_annual_high","expected_opioid_ods_annual"], "Naloxone Profile", DATA_SOURCES.naloxone));
  } else if (topic === "ed") {
    charts.push(buildComparisonChart(row, ["pct_opioid_6yr","pct_stimulant_6yr","pct_alcohol_6yr","pct_polysubstance_6yr","pct_mental_health_6yr"], "ED Visit Composition (% of Visits)", DATA_SOURCES.ed));
  } else if (topic === "demographics") {
    var dLabels = ["Age 25-34","Age 35-44","Age 45-54","Male","Female","Hispanic","NH White","NH Black"];
    var dVals = [safeVal(row.F25to34_2018_2025),safeVal(row.F35to44_2018_2025),safeVal(row.F45to54_2018_2025),safeVal(row.male_2018_2025),safeVal(row.female_2018_2025),safeVal(row.hispanic_2018_2025),safeVal(row.NH_White_2018_2025),safeVal(row.NH_Black_2018_2025)];
    charts.push(buildHorizontalBar(dLabels, dVals, "Fatal OD Demographics (2018-2025) — " + row.NAME + " County", DATA_SOURCES.demographics, CHART_COLORS));
  } else if (topic === "core" || topic === "overview") {
    charts.push(buildTrendChart(row, null));
    charts.push(buildDrugDonut(row));
  }
  return charts.filter(function(c) { return c !== null; });
}

function formatResponse(text) {
  text=text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\*(.*?)\*/g,"<em>$1</em>");
  var m=text.match(/Worth noting:([\s\S]+?)(?:\n\n|$)/);
  var main=text, worthHtml="";
  if(m){main=text.replace(m[0],"").trim();worthHtml='<div class="worth-noting"><strong>Worth noting:</strong>'+m[1]+'</div>';}
  var paras=main.split(/\n\n+/).filter(function(p){return p.trim();}).map(function(p){return"<p>"+p.trim()+"</p>";}).join("");
  return paras+worthHtml;
}

async function callGemini(prompt, retries) {
  retries=retries||2;
  for(var i=0;i<retries;i++){
    var res=await fetch(WORKER_URL+"/gemini",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    var d=await res.json();
    if(d.error){var msg=d.error.message||""; if((msg.includes("high demand")||msg.includes("overloaded")||msg.includes("429"))&&i<retries-1){await new Promise(function(r){setTimeout(r,6000);});continue;} throw new Error(msg);}
    return d.candidates[0].content.parts[0].text||"No response generated.";
  }
}

function getBurdenColor(tier) {
  if(!tier) return "#ecf0f1"; var t=tier.toLowerCase();
  if(t.includes("suppressed")) return "#bdc3c7";
  if(t.includes("high")&&t.includes("opioid")) return "#7b0d0d";
  if(t.includes("high")&&t.includes("stimulant")) return "#c0392b";
  if(t.includes("high")&&t.includes("mixed")) return "#e74c3c";
  if(t.includes("high")) return "#e74c3c";
  if(t.includes("moderate")) return "#e67e22";
  if(t.includes("low")) return "#f1c40f";
  if(t.includes("minimal")) return "#2ecc71";
  return "#ecf0f1";
}

    '<button class="map-export-btn" onclick="exportChart(\''+wrapperId+'\',\''+countyName+'_Tract_Burden_Map\')">&#8681; Download Map</button>';
  wrapper._initMap=async function(){
    try{
      var geoRes=await fetch("https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_Census2020/MapServer/8/query?where=STATE%3D'"+stateNum+"'+AND+COUNTY%3D'"+String(countyNum).padStart(3,"0")+"'&outFields=TRACT,GEOID&f=geojson&outSR=4326");
      var geo=await geoRes.json();
      if(!geo.features||!geo.features.length) return;
      var map=L.map(mapId,{zoomControl:true,attributionControl:false});
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",{maxZoom:14}).addTo(map);
      var layer=L.geoJSON(geo,{
        style:function(f){var raw=String(parseInt(f.properties.TRACT)),pad=raw.padStart(6,"0"),t=tractLookup[pad]||tractLookup[raw],color="#ecf0f1"; if(t) color=t.suppress_small_total===1?"#bdc3c7":getBurdenColor(t.burden_tier); return{fillColor:color,weight:1,color:"#fff",fillOpacity:0.8};},
        onEachFeature:function(f,lyr){var raw=String(parseInt(f.properties.TRACT)),pad=raw.padStart(6,"0"),t=tractLookup[pad]||tractLookup[raw]; if(t) lyr.bindPopup("<strong>Tract "+f.properties.TRACT+"</strong><br/>Burden: "+(t.burden_tier||"--")+"<br/>EB Rate/1k: "+fmt(t.eb_rate_total_per1k,"per1k")+"<br/>Incidents (2020-2025): "+fmt(t.incidents_total,"")+"<br/>Ecosystem: "+(t.ecosystem_type||"--")+"<br/>"+(t.suppress_small_total===1?"<em>Suppressed</em>":"Kits/yr: "+fmt(t.est_kits_needed_annual_median,"")));}
      }).addTo(map);
      map.fitBounds(layer.getBounds(),{padding:[10,10]});
    }catch(e){var el=document.getElementById(mapId);if(el)el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px">Map unavailable</div>';}
  };
  return wrapper;
}

// ── Main handler ───────────────────────────────────────────────────────────
async function handleSend() {
  if(isLoading||!countyData) return;
  var input=document.getElementById("user-input"), text=input.value.trim();
  if(!text) return;
  input.value=""; isLoading=true; document.getElementById("send-btn").disabled=true;
  addMessage("user","<p>"+text+"</p>");
  var detected=detectLocation(text);
  if(detected){sessionFIPS=detected.fips;sessionCountyName=detected.countyName;}
  var topic=detectTopic(text), troopLetter=detectTroop(text);
  addTyping();
  try{
    if(!sessionFIPS&&topic!=="troop"){
      var resp=await callGemini("The user said: \""+text+"\". No Kansas county mentioned. Ask which county or city they are working in. You are KODA. Be direct, 1-2 sentences.");
      removeTyping(); addMessage("koda",formatResponse(resp));
      addChips(["I'm from Reno County","I'm from Hutchinson","I'm from Sedgwick County","I'm from Wichita","I'm from Wyandotte County","I'm from Johnson County","I'm from Shawnee County"]);
    } else if(topic==="troop"){
      if(!troopLetter&&!sessionFIPS){
        removeTyping(); addMessage("koda","<p>Which KHP Troop area are you interested in?</p>");
        addChips(["Troop A - Olathe (KC Metro)","Troop B - Topeka (NE Kansas)","Troop C - Salina (N Central)","Troop D - Hays (NW Kansas)","Troop E - Garden City (SW Kansas)","Troop F - Wichita (S Central)","Troop H - Chanute (SE Kansas)"]);
      } else {
        var tL=troopLetter||(sessionFIPS?FIPS_TO_TROOP[sessionFIPS]:null);
        if(!tL){removeTyping();addMessage("koda","<p>Which KHP Troop area?</p>");addChips(["Troop A","Troop B","Troop C","Troop D","Troop E","Troop F","Troop H"]);}
        else{
          var troopSum=buildTroopSummary(tL);
          var aiText=await callGemini("You are KODA.\n\nKHP "+KHP_TROOPS[tL].name+" data:\n\n"+troopSum+"\n\nSummarize in 3-4 paragraphs: which counties have highest burden (with numbers), dominant drug trends, trend directions, any suppressed counties. End with 'Worth noting:' about overall pattern. Skip pleasantries.");
          removeTyping(); addMessage("koda",formatResponse(aiText),"KHP "+KHP_TROOPS[tL].name);
          addChips(["Which county in this troop has the highest burden?","Tell me about naloxone needs across this troop","What are the dominant drugs in this troop area?","Which counties are trending up?"]);
        }
      }
    } else {
      var row=countyData.find(function(r){return padFIPS(r.FIPS)===sessionFIPS;});
      if(!row){removeTyping();addMessage("koda","<p>No data found for "+sessionCountyName+" County.</p>");}
      else{
        var extra=null, mapWrapper=null, naloxoneMapWrapper=null;
        if(topic==="tract"){extra=buildTractSummary(sessionFIPS);mapWrapper=await renderTractMap(sessionFIPS,sessionCountyName);}
        if(topic==="naloxone"){naloxoneMapWrapper=await renderNaloxoneMap(sessionFIPS,sessionCountyName);}
        var peers=getPeerCounties(sessionFIPS,3);
        var sysPrompt=buildSystemPrompt(row,topic,extra,peers);
        var aiResp=await callGemini(sysPrompt+"\n\nUser message: "+text);
        removeTyping();
        var html=formatResponse(aiResp);
        if(detected) html+=renderMetrics(row,KEY_DISPLAY_FIELDS);
        var bubble=addMessage("koda",html,sessionCountyName);
        // Append map if tract
        if(mapWrapper&&bubble){bubble.appendChild(mapWrapper);setTimeout(function(){mapWrapper._initMap();},100);}
        if(naloxoneMapWrapper&&bubble){bubble.appendChild(naloxoneMapWrapper);setTimeout(function(){naloxoneMapWrapper._initMap();},150);}
        // Charts
        var noChartTopics=["tract","troop","intervention","network"];
        if(noChartTopics.indexOf(topic)<0){
          var charts=generateCharts(row,topic,peers);
          charts.forEach(function(c){if(c&&bubble)bubble.appendChild(c);});
          // Naloxone always gets opioid rate comparison chart too
          if(topic==="naloxone"){
            var oc=buildOpioidCompareChart(row,peers);
            if(oc&&bubble)bubble.appendChild(oc);
          }
        }
        addChips(["Where is overdose burden highest within this county?","What drugs are driving overdoses here?","What does our naloxone gap look like?","Tell me about fatal overdoses in our county","What intervention strategies fit our data profile?","Break down overdoses by KHP Troop area"]);
      }
    }
  }catch(e){removeTyping();addMessage("koda","<p>Error: "+e.message+". Please try again.</p>");}
  isLoading=false; document.getElementById("send-btn").disabled=false; document.getElementById("user-input").focus();
}

document.getElementById("send-btn").addEventListener("click",handleSend);
document.getElementById("user-input").addEventListener("keydown",function(e){if(e.key==="Enter")handleSend();});

// ── Init ───────────────────────────────────────────────────────────────────
async function init(){
  try{
    var setMsg=function(m){document.querySelector("#loading-screen .load-msg").textContent=m;};
    setMsg("Loading county data...");
    var results=await Promise.all([fetch(COUNTY_CSV_URL),fetch(TRACT_CSV_URL)]);
    if(!results[0].ok) throw new Error("County CSV error ("+results[0].status+")");
    if(!results[1].ok) throw new Error("Tract CSV error ("+results[1].status+")");
    setMsg("Parsing data...");
    var allCounties=parseCSV(await results[0].text());
    countyData=allCounties.filter(function(r){return r.STATE_ABBR==="KS";});
    if(!countyData.length) throw new Error("No Kansas county records found");
    stateAvgs=calcStateAvgs(countyData);
    tractData=parseCSV(await results[1].text());
    document.getElementById("loading-screen").style.display="none";
    addMessage("koda","<p>Hi, I'm <strong>KODA</strong> -- the Kansas Overdose Data Assistant, built by the CDC Foundation's Overdose Response Strategy program.</p><p>I have county-level and census tract-level overdose surveillance data for all of Kansas -- EMS incidents (2020-2025), emergency department visits with diagnosis codes, fatal overdoses (2018-2025), naloxone distribution, drug trends, spike events, and more. I automatically generate charts and visualizations alongside my responses. I can compare any county to the Kansas state average, break down data by KHP Troop area, and map overdose burden at the census tract level.</p><p>Tell me which county or city you're working in and what you'd like to know.</p>");
    addChips(["Give me an overview of Reno County","Tell me about stimulant trends in Sedgwick County","What is Wyandotte County's drug ecosystem?","Break down overdoses by KHP Troop area","Where is burden highest within Sedgwick County?"]);
  }catch(e){
    document.getElementById("loading-screen").innerHTML='<div class="logo"><span>&#9654;</span>KODA</div><div class="load-msg" style="color:#f87171;text-align:center;padding:0 24px">Error: '+e.message+'<br><br>Please refresh to try again.</div>';
  }
}
init();
</script>
