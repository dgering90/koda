<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f5f7; color: #1a1a1a; height: 100vh; display: flex; flex-direction: column; }
header { background: #1a2744; color: white; padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
header .logo { font-size: 22px; font-weight: 700; letter-spacing: 0.05em; color: #4fc3f7; }
header .subtitle { font-size: 12px; color: #90a4c8; line-height: 1.4; }
header .ors-badge { margin-left: auto; font-size: 10px; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; color: #90a4c8; letter-spacing: 0.05em; }
#chat { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.msg { display: flex; gap: 12px; max-width: 820px; }
.msg.user { flex-direction: row-reverse; align-self: flex-end; }
.msg.user .bubble { background: #1a2744; color: white; border-radius: 18px 18px 4px 18px; }
.msg.koda .bubble { background: white; border: 1px solid #e0e4ed; border-radius: 18px 18px 18px 4px; }
.bubble { padding: 12px 16px; font-size: 14px; line-height: 1.7; max-width: 700px; }
.bubble p { margin-bottom: 10px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble .worth-noting { background: #e8f4fd; border-left: 3px solid #4fc3f7; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-top: 10px; font-size: 13px; }
.bubble strong { font-weight: 600; }
.avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin-top: 2px; }
.msg.koda .avatar { background: #1a2744; color: #4fc3f7; }
.msg.user .avatar { background: #4fc3f7; color: #1a2744; }
.typing { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
.typing span { width: 7px; height: 7px; background: #90a4c8; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
.metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; margin-top: 12px; }
.metric-card { background: #f4f5f7; border-radius: 8px; padding: 10px 12px; }
.metric-card .label { font-size: 10px; color: #666; margin-bottom: 3px; line-height: 1.3; }
.metric-card .value { font-size: 16px; font-weight: 600; color: #1a2744; }
.metric-card .value.high { color: #c0392b; }
.metric-card .value.low { color: #27ae60; }
.metric-card .compare { font-size: 10px; color: #888; margin-top: 2px; }
.suggestion-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.chip { padding: 6px 14px; border-radius: 20px; border: 1px solid #c8d0e0; background: white; font-size: 12px; color: #1a2744; cursor: pointer; transition: all 0.15s; }
.chip:hover { background: #1a2744; color: white; border-color: #1a2744; }
#input-area { padding: 16px 24px; background: white; border-top: 1px solid #e0e4ed; flex-shrink: 0; }
#input-row { display: flex; gap: 10px; max-width: 820px; margin: 0 auto; }
#user-input { flex: 1; padding: 12px 16px; border: 1px solid #c8d0e0; border-radius: 24px; font-size: 14px; outline: none; font-family: inherit; }
#user-input:focus { border-color: #1a2744; }
#send-btn { padding: 12px 22px; background: #1a2744; color: white; border: none; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; }
#send-btn:disabled { opacity: 0.4; cursor: default; }
.disclaimer { font-size: 11px; color: #aaa; text-align: center; margin-top: 8px; max-width: 820px; margin-left: auto; margin-right: auto; }
.county-tag { display: inline-block; background: #e8f4fd; color: #1a6b9a; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-bottom: 6px; font-weight: 500; }
#loading-screen { position: fixed; inset: 0; background: #1a2744; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; }
#loading-screen .logo { font-size: 36px; font-weight: 700; color: #4fc3f7; letter-spacing: 0.05em; }
#loading-screen .load-msg { color: #90a4c8; font-size: 14px; }
#loading-screen .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #4fc3f7; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.tract-map { width: 100%; height: 320px; border-radius: 8px; margin-top: 12px; border: 1px solid #e0e4ed; }
.map-legend { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
.map-legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
.map-legend-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
.map-title { font-size: 12px; font-weight: 600; color: #1a2744; margin-top: 12px; margin-bottom: 4px; }
</style>

  var headers = lines[0].split(",").map(function(h) { return h.trim().replace(/^"|"$/g,""); });
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    var vals = [], cur = "", inQ = false;
    for (var ci = 0; ci < lines[i].length; ci++) {
      var c = lines[i][ci];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur); cur = ""; }
      else cur += c;
    }
    vals.push(cur);
    var row = {};
    headers.forEach(function(h, idx) {
      var v = (vals[idx] || "").trim().replace(/^"|"$/g,"");
      if (v === "" || v === "NULL" || v === "null" || v === "NA") row[h] = null;
      else if (!isNaN(v) && v !== "") row[h] = parseFloat(v);
      else row[h] = v;
    });
    rows.push(row);
  }
  return rows;
}

function calcStateAvgs(rows) {
  var avgs = {};
  if (!rows.length) return avgs;
  Object.keys(rows[0]).forEach(function(k) {
    var vals = rows.map(function(r) { return r[k]; }).filter(function(v) { return v !== null && typeof v === "number" && !isNaN(v); });
    if (vals.length) avgs[k] = vals.reduce(function(a,b) { return a+b; }, 0) / vals.length;
  });
  return avgs;
}

function padFIPS(val) {
  if (val === null || val === undefined) return null;
  return String(parseInt(val)).padStart(5,"0");
}

function detectLocation(text) {
  var lower = text.toLowerCase();
  var counties = Object.entries(COUNTY_FIPS);
  for (var i = 0; i < counties.length; i++) {
    var county = counties[i][0], fips = counties[i][1];
    if (lower.includes(county.toLowerCase() + " county") || lower.includes(county.toLowerCase()))
      return { fips: fips, countyName: county };
  }
  var cities = Object.entries(CITY_FIPS);
  for (var j = 0; j < cities.length; j++) {
    var city = cities[j][0], cfips = cities[j][1];
    if (lower.includes(city)) return { fips: cfips, countyName: FIPS_COUNTY[cfips] };
  }
  return null;
}

function detectTroop(text) {
  var lower = text.toLowerCase();
  var m = lower.match(/troop\s+([a-h])\b/i);
  if (m) return m[1].toUpperCase();
  return null;
}

function detectTopic(text) {
  var t = text.toLowerCase();
  if (/tract|neighborhood|hotspot|sub.county|where.*burden|where.*highest|census/.test(t)) return "tract";
  if (/troop|khp|highway patrol/.test(t)) return "troop";
  if (/diagnosis|dx|icd|code|presenting/.test(t)) return "ed";
  if (/polysubstance|combination|combo|co-use|multiple drug/.test(t)) return "polysubstance";
  if (/naloxone|narcan|kit|distribution|gap/.test(t)) return "naloxone";
  if (/fatal|death|died|mortality/.test(t)) return "fatal";
  if (/ed |emergency|hospital|essence|visit/.test(t)) return "ed";
  if (/demographic|age|gender|race|hispanic|youth|teen/.test(t)) return "demographics";
  if (/spike|ears|surge|cluster/.test(t)) return "spikes";
  if (/network|ecosystem|bridge|dominant/.test(t)) return "network";
  if (/trend|cagr|change|year|trajectory|getting worse|improving/.test(t)) return "trends";
  if (/meth|opioid|fentanyl|benzo|cocaine|alcohol|drug|substance/.test(t)) return "drugs";
  if (/intervention|strategy|program|prevention|address|abatement|reduce|plan|fund/.test(t)) return "intervention";
  return "core";
}

function fmt(val, field) {
  if (val === null || val === undefined) return "--";
  if (typeof val === "string") return val;
  if (field && (field.includes("pct_") || field.includes("_cagr") || field.includes("yoy_pct") || field.includes("cagr_2020") || field.includes("cagr_raw"))) {
    var v = Math.abs(val) <= 5 ? val * 100 : val;
    return v.toFixed(1) + "%";
  }
  if (field && (field.includes("per1k") || (field.includes("_rate") && !field.includes("visits")) || field.includes("ratio") || field.includes("gap") || field.includes("density") || field.includes("p_opioid") || field.includes("p_stimulant") || field.includes("confidence"))) {
    return val.toFixed(2);
  }
  return typeof val === "number" ? (val % 1 === 0 ? val.toLocaleString() : val.toFixed(1)) : val;
}

function buildDxBlock(row, suffix) {
  var label = suffix === "6yr" ? "2020-2025" : "2024-25";
  var entries = [];
  for (var i = 1; i <= 5; i++) {
    var code = row["dx" + suffix + "_rank" + i];
    var n = row["dx" + suffix + "_rank" + i + "_n"];
    if (code && n !== null) entries.push("  " + i + ". " + code + " -- " + Math.round(n).toLocaleString() + " visits");
  }
  if (!entries.length) return null;
  return "Top ED Diagnosis Codes (" + label + "):\n" + entries.join("\n");
}

function buildComboBlock(row) {
  var entries = [];
  for (var i = 1; i <= 5; i++) {
    var combo = row["TopCombo_" + i];
    var n = row["TopCombo_" + i + "_Incidents"];
    if (combo && n !== null) entries.push("  " + i + ". " + combo + " -- " + Math.round(n).toLocaleString() + " incidents");
  }
  if (!entries.length) return null;
  return "Top Polysubstance Combinations by Incident Count (2020-2025):\n" + entries.join("\n");
}

function buildDataSummary(row, topic) {
  var skipFields = {
    "TopCombo_1":1,"TopCombo_2":1,"TopCombo_3":1,"TopCombo_4":1,"TopCombo_5":1,
    "TopCombo_1_Incidents":1,"TopCombo_2_Incidents":1,"TopCombo_3_Incidents":1,"TopCombo_4_Incidents":1,"TopCombo_5_Incidents":1,
    "dx6yr_rank1":1,"dx6yr_rank2":1,"dx6yr_rank3":1,"dx6yr_rank4":1,"dx6yr_rank5":1,
    "dx6yr_rank1_n":1,"dx6yr_rank2_n":1,"dx6yr_rank3_n":1,"dx6yr_rank4_n":1,"dx6yr_rank5_n":1,
    "dx2425_rank1":1,"dx2425_rank2":1,"dx2425_rank3":1,"dx2425_rank4":1,"dx2425_rank5":1,
    "dx2425_rank1_n":1,"dx2425_rank2_n":1,"dx2425_rank3_n":1,"dx2425_rank4_n":1,"dx2425_rank5_n":1
  };

  var coreFields = TOPIC_FIELDS.core;
  var topicFields = TOPIC_FIELDS[topic] || [];
  var seen = {};
  var fields = [];
  coreFields.concat(topicFields).forEach(function(f) {
    if (!seen[f]) { seen[f] = true; fields.push(f); }
  });

  var lines = fields.filter(function(f) { return !skipFields[f]; }).map(function(f) {
    var val = row[f];
    var avg = stateAvgs[f];
    var label = FIELD_LABELS[f] || f;
    var line = label + ": " + fmt(val, f);
    if (avg !== undefined && typeof val === "number") {
      var flag = val > avg * 1.1 ? " UP ABOVE KS AVG" : val < avg * 0.9 ? " DOWN BELOW KS AVG" : " (near KS avg)";
      line += " (KS avg: " + fmt(avg, f) + flag + ")";
    }
    return line;
  });

  if (["ed","intervention","core"].includes(topic)) {
    var dx6 = buildDxBlock(row, "6yr");
    var dx24 = buildDxBlock(row, "2425");
    if (dx6) lines.push("\n" + dx6);
    if (dx24) lines.push(dx24);
  }
  if (["drugs","network","polysubstance","intervention","core"].includes(topic)) {
    var combo = buildComboBlock(row);
    if (combo) lines.push("\n" + combo);
  }
  return lines.join("\n");
}

function buildTractSummary(countyFIPS) {
  if (!tractData) return null;
  var countyNum = parseInt(countyFIPS.slice(2));
  var tracts = tractData.filter(function(r) { return r.COUNTY_FIPS !== null && parseInt(r.COUNTY_FIPS) === countyNum; });
  if (!tracts.length) return "No census tract data available for this county.";
  var suppressed = tracts.filter(function(r) { return r.suppress_small_total === 1 || r.burden_tier === null; });
  var active = tracts.filter(function(r) { return r.suppress_small_total !== 1 && r.burden_tier !== null; });
  active.sort(function(a,b) { return (b.eb_rate_total_per1k||0) - (a.eb_rate_total_per1k||0); });
  var top5 = active.slice(0,5);
  var topNaloxone = active.slice().sort(function(a,b) { return (b.est_kits_needed_annual_median||0) - (a.est_kits_needed_annual_median||0); }).slice(0,3);
  var out = "CENSUS TRACT BREAKDOWN:\nTotal tracts: " + tracts.length + " | Reportable: " + active.length + " | Suppressed: " + suppressed.length + "\n\n";
  out += "TOP 5 TRACTS BY OVERDOSE BURDEN (EB rate/1k):\n";
  top5.forEach(function(t,i) {
    out += (i+1) + ". Tract " + (t.TRACT_FIPS||t.FIPS) + ": EB Rate=" + fmt(t.eb_rate_total_per1k,"per1k") + ", Burden=" + (t.burden_tier||"--") + ", Ecosystem=" + (t.ecosystem_type||"--") + ", Incidents(2020-2025)=" + fmt(t.incidents_total,"") + ", Dominant Drug=" + (t.net_dominant_drug||"--") + "\n";
  });
  out += "\nTOP 3 TRACTS BY NALOXONE NEED (kits/year, median):\n";
  topNaloxone.forEach(function(t,i) {
    out += (i+1) + ". Tract " + (t.TRACT_FIPS||t.FIPS) + ": Kits/yr=" + fmt(t.est_kits_needed_annual_median,"") + ", Naloxone Gap=" + fmt(t.naloxone_gap,"gap") + ", Expected Opioid ODs/yr=" + fmt(t.expected_opioid_ods_annual,"") + "\n";
  });
  if (suppressed.length) out += "\nNote: " + suppressed.length + " tract(s) suppressed due to small counts.\n";
  return out;
}

function buildTroopSummary(troopLetter) {
  var troop = KHP_TROOPS[troopLetter];
  if (!troop || !countyData) return null;
  var out = "KHP " + troop.name + " -- " + troop.counties.length + " counties:\n\n";
  troop.counties.forEach(function(fips) {
    var name = FIPS_COUNTY[fips] || fips;
    var row = countyData.find(function(r) { return padFIPS(r.FIPS) === fips; });
    if (!row) { out += name + " County: [No data]\n"; return; }
    if (row.suppress_small_total === 1) {
      out += name + " County: [SUPPRESSED] Burden=" + (row.burden_tier||"--") + "\n";
    } else {
      out += name + " County: Incidents(2020-2025)=" + fmt(row.incidents_total,"") + ", Rate/1k=" + fmt(row.rate_total_per1k,"per1k") + ", Burden=" + (row.burden_tier||"--") + ", Trend=" + (row.odmap_trend_flag||"--") + ", Top Drug=" + (row.net_dominant_drug||"--") + ", CAGR=" + fmt(row.odmap_cagr_2020_2025,"cagr_2020") + "\n";
    }
  });
  return out;
}

function buildSystemPrompt(row, topic, extra) {
  var county = row.NAME;
  var pop = (row.population_1 || row.POPULATION || 0).toLocaleString();
  var troopLetter = FIPS_TO_TROOP[padFIPS(row.FIPS)];
  var troopName = troopLetter ? KHP_TROOPS[troopLetter].name : "Unknown";
  var extraContext = extra ? "\n\nADDITIONAL CONTEXT:\n" + extra : "";

  return "You are KODA, the Kansas Overdose Data Assistant -- built by the CDC Foundation's Overdose Response Strategy (ORS) program.\n\n" +
    "You are speaking with a community partner, public health professional, law enforcement officer, or prevention coalition member about " + county + " County, Kansas (population: " + pop + ", KHP Troop: " + troopName + ").\n\n" +
    "IMPORTANT DATA NOTES:\n" +
    "- Incident totals (incidents_total, Opioid, Methamphetamine, etc.) cover 2020-2025 from ODMAP\n" +
    "- Annual rates (rate_YYYY_per1k) are per 1,000 residents per year\n" +
    "- Fatal OD data (F2018_2025_*) covers 2018-2025 from KDHE Vital Statistics\n" +
    "- ED visit data (visits_6yr) covers 2020-2025 from ESSENCE\n" +
    "- CAGR values with absolute value <= 5 are stored as decimals -- multiply by 100 for percentage\n" +
    "- Suppressed data means counts were too small to report reliably\n" +
    "- When naloxone is asked about, use the HIGH ESTIMATE as the primary planning figure\n" +
    "- TopCombo_1 through TopCombo_5 are the top polysubstance combinations by RAW INCIDENT COUNT -- always use these when discussing most common combinations\n" +
    "- net_strongest_pair is the strongest pair by JACCARD SIMILARITY (proportional co-occurrence network metric) -- only reference this when specifically discussing drug network analysis, and always distinguish it from the incident-count-based combos\n" +
    "- net_bridge_drug is the substance connecting the most other drugs in the network -- useful for intervention targeting\n\n" +
    "COUNTY DATA (" + county.toUpperCase() + "):\n" +
    buildDataSummary(row, topic) + extraContext + "\n\n" +
    "RESPONSE STYLE:\n" +
    "- Get directly to the data -- skip pleasantries\n" +
    "- Always specify time periods when citing totals\n" +
    "- Use specific numbers. Never invent figures not listed above.\n" +
    "- Compare to Kansas state average when relevant\n" +
    "- Proactively surface 1-2 insights the user did not ask about but should know\n" +
    "- When users describe intervention ideas, engage with what the data specifically supports\n" +
    "- 2-4 focused paragraphs unless detailed breakdown is needed\n" +
    "- If data is suppressed or unavailable, say so clearly\n" +
    "- End with a 'Worth noting:' line when there is an actionable insight\n" +
    "- Professional but direct";
}

function getBurdenColor(tier) {
  if (!tier) return "#ecf0f1";
  var t = tier.toLowerCase();
  if (t.includes("suppressed")) return "#bdc3c7";
  if (t.includes("high") && t.includes("opioid")) return "#7b0d0d";
  if (t.includes("high") && t.includes("stimulant")) return "#c0392b";
  if (t.includes("high") && t.includes("mixed")) return "#e74c3c";
  if (t.includes("high")) return "#e74c3c";
  if (t.includes("moderate")) return "#e67e22";
  if (t.includes("low")) return "#f1c40f";
  if (t.includes("minimal")) return "#2ecc71";
  return "#ecf0f1";
}

function renderMetrics(row, fields) {
  var cards = fields.map(function(f) {
    var val = row[f];
    if (val === null || val === undefined) return "";
    var avg = stateAvgs[f];
    var isNum = typeof val === "number";
    var isHigh = isNum && avg !== undefined && val > avg * 1.1;
    var isLow = isNum && avg !== undefined && val < avg * 0.9;
    var compare = isNum && avg !== undefined ? "KS avg: " + fmt(avg, f) : "";
    return '<div class="metric-card">' +
      '<div class="label">' + (FIELD_LABELS[f]||f) + '</div>' +
      '<div class="value ' + (isHigh?"high":isLow?"low":"") + '">' + fmt(val,f) + (isHigh?" ▲":isLow?" ▼":"") + '</div>' +
      (compare ? '<div class="compare">' + compare + '</div>' : '') +
      '</div>';
  }).join("");
  return '<div class="metric-grid">' + cards + '</div>';
}

function addMessage(role, html, tag) {
  var chat = document.getElementById("chat");
  var div = document.createElement("div");
  div.className = "msg " + role;
  var tagHtml = tag ? '<div class="county-tag">' + tag + '</div>' : "";
  div.innerHTML = '<div class="avatar">' + (role==="koda"?"K":"U") + '</div><div class="bubble">' + tagHtml + html + '</div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div.querySelector(".bubble");
}

function addTyping() {
  var chat = document.getElementById("chat");
  var div = document.createElement("div");
  div.className = "msg koda";
  div.id = "typing-indicator";
  div.innerHTML = '<div class="avatar">K</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById("typing-indicator");
  if (t) t.remove();
}

function addChips(chips) {
  var chat = document.getElementById("chat");
  var div = document.createElement("div");
  div.className = "msg koda";
  div.innerHTML = '<div class="avatar" style="opacity:0">K</div><div class="bubble" style="background:transparent;border:none;padding:4px 0"><div class="suggestion-chips">' +
    chips.map(function(s) { return '<button class="chip" onclick="sendChip(\'' + s.replace(/'/g,"&#39;") + '\')">' + s + '</button>'; }).join("") +
    '</div></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

window.sendChip = function(t) {
  var detected = detectLocation(t);
  if (detected) { sessionFIPS = detected.fips; sessionCountyName = detected.countyName; }
  document.getElementById("user-input").value = t;
  handleSend();
};

function formatResponse(text) {
  text = text.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
  text = text.replace(/\*(.*?)\*/g, "<em>$1</em>");
  var m = text.match(/Worth noting:([\s\S]+?)(?:\n\n|$)/);
  var main = text, worthHtml = "";
  if (m) {
    main = text.replace(m[0],"").trim();
    worthHtml = '<div class="worth-noting"><strong>Worth noting:</strong>' + m[1] + '</div>';
  }
  var paras = main.split(/\n\n+/).filter(function(p) { return p.trim(); }).map(function(p) { return "<p>" + p.trim() + "</p>"; }).join("");
  return paras + worthHtml;
}

async function callGemini(prompt, retries) {
  retries = retries || 2;
  for (var i = 0; i < retries; i++) {
    var res = await fetch(WORKER_URL + "/gemini", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    var d = await res.json();
    if (d.error) {
      var msg = d.error.message || "";
      var isOverload = msg.includes("high demand") || msg.includes("overloaded") || msg.includes("503") || msg.includes("429");
      if (isOverload && i < retries - 1) {
        await new Promise(function(r) { setTimeout(r, 6000); });
        continue;
      }
      throw new Error(msg);
    }
    return d.candidates[0].content.parts[0].text || "I was not able to generate a response.";
  }
}

async function renderTractMap(countyFIPS, countyName) {
  var countyNum = parseInt(countyFIPS.slice(2));
  var stateNum = countyFIPS.slice(0,2);
  var tracts = tractData ? tractData.filter(function(r) { return r.COUNTY_FIPS !== null && parseInt(r.COUNTY_FIPS) === countyNum; }) : [];
  if (!tracts.length) return null;

  var tractLookup = {};
  tracts.forEach(function(t) {
    var tractId = String(parseInt(t.TRACT_FIPS || 0)).padStart(6,"0");
    tractLookup[tractId] = t;
  });

  var mapId = "map-" + (++mapCounter);
  var wrapper = document.createElement("div");
  var legendItems = [
    ["High Burden Opioid","#7b0d0d"],["High Burden Stimulant","#c0392b"],["High Burden Mixed","#e74c3c"],
    ["Moderate Burden","#e67e22"],["Low Burden","#f1c40f"],["Minimal Burden","#2ecc71"],
    ["Suppressed","#bdc3c7"],["No Data","#ecf0f1"]
  ];
  wrapper.innerHTML = '<div class="map-title">Census Tract Overdose Burden -- ' + countyName + ' County</div>' +
    '<div id="' + mapId + '" class="tract-map"></div>' +
    '<div class="map-legend">' +
    legendItems.map(function(item) {
      return '<div class="map-legend-item"><div class="map-legend-swatch" style="background:' + item[1] + '"></div>' + item[0] + '</div>';
    }).join("") + '</div>';

  wrapper._initMap = async function() {
    try {
      var geoUrl = "https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_Census2020/MapServer/8/query?where=STATE%3D'" + stateNum + "'+AND+COUNTY%3D'" + String(countyNum).padStart(3,"0") + "'&outFields=TRACT,GEOID&f=geojson&outSR=4326";
      var geoRes = await fetch(geoUrl);
      var geo = await geoRes.json();
      if (!geo.features || !geo.features.length) return;

      var map = L.map(mapId, { zoomControl: true, attributionControl: false });
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png", { maxZoom: 14 }).addTo(map);

      var layer = L.geoJSON(geo, {
        style: function(feature) {
          var tractId = String(feature.properties.TRACT).padStart(6,"0");
          var t = tractLookup[tractId];
          var color = "#ecf0f1";
          if (t) color = t.suppress_small_total === 1 ? "#bdc3c7" : getBurdenColor(t.burden_tier);
          return { fillColor: color, weight: 1, color: "#fff", fillOpacity: 0.8 };
        },
        onEachFeature: function(feature, lyr) {
          var tractId = String(feature.properties.TRACT).padStart(6,"0");
          var t = tractLookup[tractId];
          if (t) {
            var suppressed = t.suppress_small_total === 1;
            lyr.bindPopup("<strong>Tract " + feature.properties.TRACT + "</strong><br/>" +
              "Burden: " + (t.burden_tier||"--") + "<br/>" +
              "EB Rate/1k: " + fmt(t.eb_rate_total_per1k,"per1k") + "<br/>" +
              "Incidents (2020-2025): " + fmt(t.incidents_total,"") + "<br/>" +
              "Ecosystem: " + (t.ecosystem_type||"--") + "<br/>" +
              (suppressed ? "<em>Data suppressed</em>" : "Kits Needed/yr: " + fmt(t.est_kits_needed_annual_median,"")));
          }
        }
      }).addTo(map);

      map.fitBounds(layer.getBounds(), { padding: [10,10] });
    } catch(e) {
      var el = document.getElementById(mapId);
      if (el) el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px">Map unavailable -- tract boundaries could not be loaded</div>';
    }
  };
  return wrapper;
}

async function handleSend() {
  if (isLoading || !countyData) return;
  var input = document.getElementById("user-input");
  var text = input.value.trim();
  if (!text) return;
  input.value = "";
  isLoading = true;
  document.getElementById("send-btn").disabled = true;

  addMessage("user", "<p>" + text + "</p>");

  var detected = detectLocation(text);
  if (detected) { sessionFIPS = detected.fips; sessionCountyName = detected.countyName; }

  var topic = detectTopic(text);
  var troopLetter = detectTroop(text);

  addTyping();

  try {
    if (!sessionFIPS && topic !== "troop") {
      var resp = await callGemini("The user said: \"" + text + "\". They have not mentioned a Kansas county or city. Ask which county or city they are working in. You are KODA, the Kansas Overdose Data Assistant. Be direct -- 1-2 sentences only.");
      removeTyping();
      addMessage("koda", formatResponse(resp));
      addChips(["I'm from Reno County","I'm from Hutchinson","I'm from Sedgwick County","I'm from Wichita","I'm from Wyandotte County","I'm from Johnson County","I'm from Shawnee County"]);
    } else if (topic === "troop") {
      if (!troopLetter && !sessionFIPS) {
        removeTyping();
        addMessage("koda", "<p>I can break down overdose data by KHP Troop area. Which troop are you interested in?</p>");
        addChips(["Troop A - Olathe (KC Metro)","Troop B - Topeka (NE Kansas)","Troop C - Salina (N Central)","Troop D - Hays (NW Kansas)","Troop E - Garden City (SW Kansas)","Troop F - Wichita (S Central)","Troop H - Chanute (SE Kansas)"]);
      } else {
        var tLetter = troopLetter || (sessionFIPS ? FIPS_TO_TROOP[sessionFIPS] : null);
        if (!tLetter) {
          removeTyping();
          addMessage("koda", "<p>Which KHP Troop area are you interested in?</p>");
          addChips(["Troop A - Olathe","Troop B - Topeka","Troop C - Salina","Troop D - Hays","Troop E - Garden City","Troop F - Wichita","Troop H - Chanute"]);
        } else {
          var troopSummary = buildTroopSummary(tLetter);
          var troopPrompt = "You are KODA, the Kansas Overdose Data Assistant.\n\nThe user asked about KHP " + KHP_TROOPS[tLetter].name + " overdose data.\n\n" + troopSummary + "\n\nSummarize the overdose landscape across these counties in 3-4 focused paragraphs. Be specific with numbers. Cover:\n1. Which counties have the highest burden and rates (with actual figures)\n2. Dominant drug trends across the troop area and county-level variation\n3. Trend directions -- which counties are increasing, stable, or decreasing\n4. Any suppressed counties and what that means\n\nEnd with a 'Worth noting:' insight about the troop area's overall pattern. Skip pleasantries -- get straight to the data.";
          var aiText = await callGemini(troopPrompt);
          removeTyping();
          addMessage("koda", formatResponse(aiText), "KHP " + KHP_TROOPS[tLetter].name);
          addChips(["Which county in this troop has the highest burden?","Tell me about naloxone needs across this troop","What are the dominant drugs in this troop area?","Which counties are trending up?"]);
        }
      }
    } else {
      var row = countyData.find(function(r) { return padFIPS(r.FIPS) === sessionFIPS; });
      if (!row) {
        removeTyping();
        addMessage("koda", "<p>No data found for " + sessionCountyName + " County. Please try again.</p>");
      } else {
        var extra = null;
        var mapWrapper = null;
        if (topic === "tract") {
          extra = buildTractSummary(sessionFIPS);
          mapWrapper = await renderTractMap(sessionFIPS, sessionCountyName);
        }
        var sysPrompt = buildSystemPrompt(row, topic, extra);
        var aiResponse = await callGemini(sysPrompt + "\n\nUser message: " + text);
        removeTyping();
        var html = formatResponse(aiResponse);
        if (detected) html += renderMetrics(row, KEY_DISPLAY_FIELDS);
        var bubble = addMessage("koda", html, sessionCountyName);
        if (mapWrapper && bubble) {
          bubble.appendChild(mapWrapper);
          setTimeout(function() { mapWrapper._initMap(); }, 100);
        }
        addChips([
          "Where is overdose burden highest within this county?",
          "What drugs are driving overdoses here?",
          "What does our naloxone gap look like?",
          "Tell me about fatal overdoses in our county",
          "What intervention strategies fit our data profile?",
          "Break down overdoses by KHP Troop area"
        ]);
      }
    }
  } catch(e) {
    removeTyping();
    addMessage("koda", "<p>Error: " + e.message + ". Please try again.</p>");
  }

  isLoading = false;
  document.getElementById("send-btn").disabled = false;
  document.getElementById("user-input").focus();
}

document.getElementById("send-btn").addEventListener("click", handleSend);
document.getElementById("user-input").addEventListener("keydown", function(e) { if (e.key === "Enter") handleSend(); });

async function init() {
  try {
    var setMsg = function(m) { document.querySelector("#loading-screen .load-msg").textContent = m; };
    setMsg("Loading county data...");
    var results = await Promise.all([fetch(COUNTY_CSV_URL), fetch(TRACT_CSV_URL)]);
    var cRes = results[0], tRes = results[1];
    if (!cRes.ok) throw new Error("County CSV error (" + cRes.status + ")");
    if (!tRes.ok) throw new Error("Tract CSV error (" + tRes.status + ")");
    setMsg("Parsing data...");
    var cText = await cRes.text();
    var tText = await tRes.text();
    var allCounties = parseCSV(cText);
    countyData = allCounties.filter(function(r) { return r.STATE_ABBR === "KS"; });
    if (!countyData.length) throw new Error("No Kansas county records found");
    stateAvgs = calcStateAvgs(countyData);
    tractData = parseCSV(tText);
    document.getElementById("loading-screen").style.display = "none";
    addMessage("koda",
      "<p>Hi, I'm <strong>KODA</strong> -- the Kansas Overdose Data Assistant, built by the CDC Foundation's Overdose Response Strategy program.</p>" +
      "<p>I have county-level and census tract-level overdose surveillance data for all of Kansas -- EMS incidents (2020-2025), emergency department visits with diagnosis codes, fatal overdoses (2018-2025), naloxone distribution, drug trends, spike events, and more. I can compare any county to the Kansas state average, break down data by KHP Troop area, and map overdose burden at the census tract level.</p>" +
      "<p>Tell me which county or city you're working in and what you'd like to know.</p>"
    );
    addChips([
      "Give me an overview of Reno County",
      "Tell me about stimulant trends in Sedgwick County",
      "What is Wyandotte County's drug ecosystem?",
      "Break down overdoses by KHP Troop area",
      "Where is burden highest within Sedgwick County?"
    ]);
  } catch(e) {
    document.getElementById("loading-screen").innerHTML =
      '<div class="logo">KODA</div>' +
      '<div class="load-msg" style="color:#f87171;text-align:center;padding:0 24px">Error: ' + e.message + '<br><br>Please refresh to try again.</div>';
  }
}

init();
</script>

</html>
