<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KODA — Kansas Overdose Data Assistant</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#E7E9EC;color:#232D2E;height:100vh;display:flex;flex-direction:column}
header{background:#325379;color:white;padding:10px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;border-bottom:3px solid #F3C108}
.logo{font-size:32px;font-weight:700;letter-spacing:.08em;color:#76ACC1}
.logo span{color:#F3C108;margin-right:6px}
.subtitle{font-size:15px;color:#BCD4DE;line-height:1.5}
.ors-logo{margin-left:auto;height:110px;width:auto;display:block;flex-shrink:0}
#chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:12px;max-width:860px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.user .bubble{background:#325379;color:white;border-radius:18px 18px 4px 18px}
.msg.koda .bubble{background:white;border:1px solid #BFCDDF;border-radius:18px 18px 18px 4px}
.bubble{padding:12px 16px;font-size:14px;line-height:1.7;max-width:740px}
.bubble p{margin-bottom:10px}.bubble p:last-child{margin-bottom:0}
.worth-noting{background:#E5EEF1;border-left:3px solid #488286;padding:8px 12px;border-radius:0 6px 6px 0;margin-top:10px;font-size:13px;color:#325379}
.bubble strong{font-weight:700}
.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:2px}
.msg.koda .avatar{background:#325379;color:#76ACC1}
.msg.user .avatar{background:#76ACC1;color:#325379}
.typing{display:flex;align-items:center;gap:4px;padding:14px 16px}
.typing span{width:7px;height:7px;background:#628496;border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-top:12px}
.metric-card{background:#E5EEF1;border-radius:6px;padding:10px 12px;border:1px solid #BFCDDF}
.metric-card .lbl{font-size:10px;color:#628496;margin-bottom:3px;line-height:1.3;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.metric-card .val{font-size:16px;font-weight:700;color:#325379}
.metric-card .val.high{color:#c0392b}.metric-card .val.low{color:#488286}
.metric-card .cmp{font-size:10px;color:#628496;margin-top:2px}
.multi-metric-section{margin-top:14px}
.multi-metric-header{font-size:11px;font-weight:700;color:#325379;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #BFCDDF}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{padding:6px 14px;border-radius:20px;border:1px solid #76ACC1;background:white;font-size:12px;color:#325379;cursor:pointer;transition:all .15s}
.chip:hover{background:#325379;color:white;border-color:#325379}
.suggestion-bubble{background:#F0F6F8;border:1px dashed #76ACC1;border-radius:12px;padding:10px 14px;margin-top:4px;font-size:13px;color:#325379;line-height:1.6}
.suggestion-bubble .sug-label{font-size:10px;font-weight:700;color:#76ACC1;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.suggestion-bubble .sug-links{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.sug-link{padding:4px 11px;border-radius:14px;border:1px solid #488286;background:white;font-size:12px;color:#488286;cursor:pointer;transition:all .15s}
.sug-link:hover{background:#488286;color:white}
#input-area{padding:16px 24px;background:white;border-top:2px solid #BFCDDF;flex-shrink:0}
#input-row{display:flex;gap:10px;max-width:860px;margin:0 auto}
#user-input{flex:1;padding:12px 16px;border:1px solid #BFCDDF;border-radius:24px;font-size:14px;outline:none;font-family:Arial,sans-serif;color:#232D2E}
#user-input:focus{border-color:#325379}
#send-btn{padding:12px 22px;background:#325379;color:white;border:none;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
#send-btn:hover{background:#488286}
#send-btn:disabled{opacity:.4;cursor:default}
.disclaimer{font-size:11px;color:#628496;text-align:center;margin-top:8px;max-width:860px;margin-left:auto;margin-right:auto}
.county-tag{display:inline-block;background:#BCD4DE;color:#325379;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:6px;font-weight:700}
#loading-screen{position:fixed;inset:0;background:#325379;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100}
#loading-screen .logo{font-size:36px}
#loading-screen .load-msg{color:#BCD4DE;font-size:14px}
#loading-screen .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#76ACC1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.chart-wrapper{margin-top:14px;background:white;border:1px solid #BFCDDF;border-radius:8px;padding:14px}
.chart-title{font-size:12px;font-weight:700;color:#325379;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.chart-source{font-size:10px;color:#628496;margin-top:6px}
.dl-btn{margin-top:8px;padding:5px 12px;background:#325379;color:white;border:none;border-radius:20px;font-size:11px;cursor:pointer;font-family:Arial,sans-serif;font-weight:700}
.dl-btn:hover{background:#488286}
.tract-map{width:100%;height:320px;border-radius:6px;margin-top:12px;border:1px solid #BFCDDF}
.county-map{width:100%;height:400px;border-radius:6px;margin-top:12px;border:1px solid #BFCDDF}
.map-legend{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;align-items:center}
.map-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#628496}
.map-swatch{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.map-title{font-size:12px;font-weight:700;color:#325379;margin-top:12px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.tbl-wrap{margin-top:14px}
.tbl-title{font-size:11px;font-weight:700;color:#325379;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.tbl-source{font-size:10px;color:#628496;margin-top:4px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{background:#325379;color:white;padding:8px 10px;text-align:left;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.data-table td{padding:7px 10px;border-bottom:1px solid #BFCDDF;color:#232D2E}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:nth-child(even) td{background:#E5EEF1}
.footnote{font-size:11px;color:#628496;margin-top:6px;font-style:italic}
.troop-total{background:#325379;color:white;padding:8px 12px;border-radius:6px;font-size:13px;font-weight:700;margin-top:8px;display:inline-block}
</style>
</head>

// ── Utilities ──────────────────────────────────────────────────────────────
function parseCSV(text){
  var lines=text.split(/\r?\n/);if(lines.length<2) return [];
  var headers=lines[0].split(",").map(function(h){return h.trim().replace(/^"|"$/g,"");});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    var vals=[],cur="",inQ=false;
    for(var ci=0;ci<lines[i].length;ci++){var c=lines[i][ci];if(c==='"'){inQ=!inQ;}else if(c===','&&!inQ){vals.push(cur);cur="";}else cur+=c;}
    vals.push(cur);
    var row={};
    headers.forEach(function(h,idx){var v=(vals[idx]||"").trim().replace(/^"|"$/g,"");if(v===""||v==="NULL"||v==="null"||v==="NA")row[h]=null;else if(!isNaN(v)&&v!=="")row[h]=parseFloat(v);else row[h]=v;});
    rows.push(row);
  }
  return rows;
}
function calcAvgs(rows){
  var a={};if(!rows.length) return a;
  Object.keys(rows[0]).forEach(function(k){var vals=rows.map(function(r){return r[k];}).filter(function(v){return v!==null&&typeof v==="number"&&!isNaN(v);});if(vals.length)a[k]=vals.reduce(function(x,y){return x+y;},0)/vals.length;});
  return a;
}
function calcSD(rows,key,mean){
  var vals=rows.map(function(r){return r[key];}).filter(function(v){return v!==null&&typeof v==="number"&&!isNaN(v);});
  if(!vals.length) return 1;
  var variance=vals.reduce(function(acc,v){return acc+Math.pow(v-mean,2);},0)/vals.length;
  return Math.sqrt(variance)||1;
}
function padFIPS(v){return v===null||v===undefined?null:String(parseInt(v)).padStart(5,"0");}
function sv(v){return(v===null||v===undefined||isNaN(v))?0:parseFloat(v);}
function cleanName(n){if(!n) return n;return n.replace(/\s+County\s*$/i,"");}

// FIX: fmt — yoy_pct fields are already percentages, never multiply
function fmt(v,f){
  if(v===null||v===undefined) return "--";
  if(typeof v==="string") return v;
  // Fields already stored as percentages — display as-is with % sign
  if(f&&(f.includes("pct_")||f.includes("hospital_rate"))){
    return parseFloat(v).toFixed(1)+"%";
  }
  // yoy_pct fields: already in percent form (e.g. 12.4 = 12.4%), never multiply
  if(f&&f.includes("yoy_pct")){
    return parseFloat(v).toFixed(1)+"%";
  }
  // Other rate/density fields
  if(f&&(f.includes("per1k")||(f.includes("_rate")&&!f.includes("visits")&&!f.includes("hospital"))||f.includes("gap")||f.includes("density")||f.includes("p_opioid")||f.includes("p_stimulant")||f.includes("confidence")))
    return parseFloat(v).toFixed(2);
  return typeof v==="number"?(v%1===0?v.toLocaleString():v.toFixed(1)):v;
}

function ecoColor(eco){
  if(!eco) return "#E5EEF1";
  var k=eco.toLowerCase().trim();
  for(var key in ECO_COLORS){if(k===key||k.indexOf(key)===0) return ECO_COLORS[key];}
  // Fallback partial match
  for(var key2 in ECO_COLORS){if(k.indexOf(key2.split(" ")[0])>=0) return ECO_COLORS[key2];}
  return "#E5EEF1";
}

// FIX: burden tier color — check "very high" before "high"
function burdenColor(tier){
  if(!tier) return "#E5EEF1";
  var b=tier.toLowerCase();
  if(b.includes("very high")) return ORS.dkred;
  if(b.includes("high"))      return ORS.red;
  if(b.includes("moderate"))  return ORS.orange;
  if(b.includes("low"))       return ORS.yellow;
  if(b.includes("minimal"))   return ORS.green;
  return "#E5EEF1";
}

// ── z-score color for hospital transport map ───────────────────────────────
// Blue = above mean (higher transport), Red = below mean (lower transport)
function zscoreColor(val,mean,sd){
  var z=(val-mean)/sd;
  if(z>=2)  return "#08519c"; // deep blue
  if(z>=1)  return "#3182bd";
  if(z>=0)  return "#9ecae1"; // light blue
  if(z>=-1) return "#fc8d59"; // light red
  if(z>=-2) return "#d7301f";
  return "#7f0000";           // deep red
}

// ── Location detection (FIX: word-boundary matching) ──────────────────────
function detectLocs(text){
  // Strip generic filler phrases that confuse multi-county detection
  var cleaned=text.toLowerCase()
    .replace(/\ball\s+\d+\s+counties?\b/gi,"")
    .replace(/\bthese\s+counties?\b/gi,"")
    .replace(/\bthose\s+counties?\b/gi,"")
    .replace(/\bthe\s+counties?\b/gi,"")
    .replace(/\beach\s+county\b/gi,"")
    .replace(/\bboth\s+counties?\b/gi,"");

  var found=[];
  // Match county names with word boundaries — require county name to be a whole word
  Object.keys(CF).forEach(function(county){
    var re=new RegExp("\\b"+county.toLowerCase().replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
    if(re.test(cleaned+" county")||re.test(cleaned))
      found.push({fips:CF[county],countyName:county});
  });
  if(!found.length){
    Object.keys(CityF).forEach(function(city){
      var re=new RegExp("\\b"+city.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","i");
      if(re.test(cleaned)) found.push({fips:CityF[city],countyName:FC[CityF[city]]});
    });
  }
  var seen={},unique=[];
  found.forEach(function(f){if(!seen[f.fips]){seen[f.fips]=1;unique.push(f);}});
  return unique;
}

function detectTroop(text){var m=text.match(/\btroop\s+([a-h])\b/i);return m?m[1].toUpperCase():null;}

function detectTopic(t){
  t=t.toLowerCase();
  if(/hospital.*transport|transport.*rate|ems.*transport/.test(t)) return "transport";
  if(/tract|neighborhood|hotspot|where.*burden|where.*highest|census/.test(t)) return "tract";
  if(/troop|khp|highway patrol/.test(t)) return "troop";
  if(/diagnosis|dx|icd|code/.test(t)) return "ed";
  if(/polysubstance|combination|combo|co-use|multiple drug/.test(t)) return "polysubstance";
  if(/naloxone|narcan|kit|distribution|gap/.test(t)) return "naloxone";
  if(/fatal|death|died|mortality/.test(t)) return "fatal";
  if(/suicide|mental health|behavioral health|depression|anxiety|ideation/.test(t)) return "ed";
  if(/\bed\b|emergency|hospital|essence|visit/.test(t)) return "ed";
  if(/demographic|age|gender|race|hispanic|youth|teen/.test(t)) return "demographics";
  if(/spike|ears|surge|cluster/.test(t)) return "spikes";
  if(/network|ecosystem|bridge|dominant/.test(t)) return "network";
  if(/trend|year.over.year|yoy|change|trajectory/.test(t)) return "trends";
  if(/meth|opioid|fentanyl|benzo|cocaine|alcohol|drug|substance/.test(t)) return "drugs";
  if(/intervention|strategy|program|prevention|abatement|plan|fund|spend|budget/.test(t)) return "intervention";
  return "core";
}

function getChoroMetric(topic){
  if(topic==="naloxone")  return {field:"est_kits_needed_annual_median",label:"Kits/yr (median)"};
  if(topic==="fatal")     return {field:"crude_rate_all_fatal_per100k",label:"Fatal OD Rate per 100k"};
  if(topic==="drugs"||topic==="network"||topic==="polysubstance") return {field:"ecosystem_type",label:"Drug Ecosystem",categorical:true,ecoMode:true};
  if(topic==="burden"||topic==="tract") return {field:"burden_tier",label:"Burden Tier",categorical:true,burdenMode:true};
  return {field:"odmap_eb_rate_total_per1k",label:"EB Rate per 1,000"};
}

function buildSuggestions(rows,topic,isMulti,shownTract,shownEco){
  var r=rows[0],sugs=[];
  if(topic!=="tract"&&!isMulti) sugs.push("Where is overdose burden highest within "+cleanName(r.NAME)+" County?");
  if(topic!=="fatal") sugs.push("Tell me about fatal overdoses in "+(isMulti?"these counties":cleanName(r.NAME)+" County"));
  if(topic!=="naloxone") sugs.push("What does the naloxone gap look like "+(isMulti?"across these counties":"in "+cleanName(r.NAME)+" County")+"?");
  if(!isMulti&&r.hospital_rate&&stateAvgs.hospital_rate&&topic!=="transport")
    sugs.push("Can you show me the hospital transport rate map for "+cleanName(r.NAME)+" County?");
  if(!isMulti&&topic!=="naloxone")
    sugs.push("Show me a naloxone kit need map by census tract for "+cleanName(r.NAME)+" County");
  if(!isMulti&&r.pct_suicide_att_6yr&&stateAvgs.pct_suicide_att_6yr&&r.pct_suicide_att_6yr>stateAvgs.pct_suicide_att_6yr*1.15&&topic!=="ed")
    sugs.unshift("What proportion of overdose ED visits involved a suicide attempt in "+cleanName(r.NAME)+" County?");
  if(!isMulti&&sv(r.visits_12_17_6yr)>10&&topic!=="demographics")
    sugs.unshift("Can you break down ED visits by age group for "+cleanName(r.NAME)+" County?");
  if(!isMulti&&r.frequent_3plus_6yr&&stateAvgs.frequent_3plus_6yr&&r.frequent_3plus_6yr>stateAvgs.frequent_3plus_6yr*1.2&&topic!=="ed")
    sugs.unshift("How many "+cleanName(r.NAME)+" County patients had 3 or more ED visits?");
  if((topic==="drugs"||topic==="core")&&!isMulti&&!shownEco)
    sugs.unshift("Show me the drug ecosystem map for "+cleanName(r.NAME)+" County");
  if(isMulti&&rows.length>=2){
    var fa=rows.map(function(x){return padFIPS(x.FIPS);});
    if(areAllContiguous(fa))
      sugs.unshift("Show me a census tract map for "+rows.map(function(x){return cleanName(x.NAME);}).join(", "));
  }
  var seen={},out=[];sugs.forEach(function(s){if(!seen[s]){seen[s]=1;out.push(s);}});
  return out.slice(0,3);
}

function getPeers(fips,n){
  n=n||3;if(!countyData) return [];
  var row=countyData.find(function(r){return padFIPS(r.FIPS)===fips;});if(!row) return [];
  var pop=row.population_1||row.POPULATION||0,burden=row.burden_tier||"",eco=row.ecosystem_type||"";
  var scored=countyData.filter(function(r){return padFIPS(r.FIPS)!==fips&&r.suppress_small_total!==1;}).map(function(r){
    var sc=0,rp=r.population_1||r.POPULATION||0;
    if(pop>0&&Math.abs(rp-pop)/pop<0.5)sc+=3;else if(pop>0&&Math.abs(rp-pop)/pop<1.0)sc+=1;
    if(r.burden_tier&&r.burden_tier===burden)sc+=2;if(r.ecosystem_type&&r.ecosystem_type===eco)sc+=2;
    return{row:r,sc:sc};
  });
  scored.sort(function(a,b){return b.sc-a.sc;});return scored.slice(0,n).map(function(s){return s.row;});
}

function shouldShowEDAge(row,text){var t=text.toLowerCase();if(/age|youth|teen|young|older|elder|senior|pediatric/.test(t))return true;if(/\bed\b|emergency|hospital|essence|visit|treatment|access/.test(t))return true;return false;}
function shouldShowRepeatVisit(row,text){var t=text.toLowerCase();if(/repeat|frequent|revolving|treatment gap|access|capacity/.test(t))return true;if(row.rapid30_6yr&&stateAvgs.rapid30_6yr&&row.rapid30_6yr>stateAvgs.rapid30_6yr*1.3)return true;return false;}

function parseAITags(text){
  var tags=[],matches=text.match(/\[SHOW:([a-z_]+)\]/g)||[];
  matches.forEach(function(m){tags.push(m.replace("[SHOW:","").replace("]",""));});
  return{text:text.replace(/\[SHOW:[a-z_]+\]/g,"").trim(),tags:tags};
}

function buildDxBlock(row,sfx){var lbl=sfx==="6yr"?"2020-2025":"2024-25",e=[];for(var i=1;i<=5;i++){var c=row["dx"+sfx+"_rank"+i],n=row["dx"+sfx+"_rank"+i+"_n"];if(c&&n!==null)e.push("  "+i+". "+c+" -- "+Math.round(n).toLocaleString()+" visits");}return e.length?"Top ED Diagnosis Codes ("+lbl+"):\n"+e.join("\n"):null;}
function buildComboBlock(row){var e=[];for(var i=1;i<=5;i++){var c=row["TopCombo_"+i],n=row["TopCombo_"+i+"_Incidents"];if(c&&n!==null)e.push("  "+i+". "+c+" -- "+Math.round(n).toLocaleString()+" incidents");}return e.length?"Top Polysubstance Combinations:\n"+e.join("\n"):null;}

function buildDataSummary(rows,topic){
  var isMulti=rows.length>1;
  var skip={"TopCombo_1":1,"TopCombo_2":1,"TopCombo_3":1,"TopCombo_4":1,"TopCombo_5":1,"TopCombo_1_Incidents":1,"TopCombo_2_Incidents":1,"TopCombo_3_Incidents":1,"TopCombo_4_Incidents":1,"TopCombo_5_Incidents":1,"dx6yr_rank1":1,"dx6yr_rank2":1,"dx6yr_rank3":1,"dx6yr_rank4":1,"dx6yr_rank5":1,"dx6yr_rank1_n":1,"dx6yr_rank2_n":1,"dx6yr_rank3_n":1,"dx6yr_rank4_n":1,"dx6yr_rank5_n":1,"dx2425_rank1":1,"dx2425_rank2":1,"dx2425_rank3":1,"dx2425_rank4":1,"dx2425_rank5":1,"dx2425_rank1_n":1,"dx2425_rank2_n":1,"dx2425_rank3_n":1,"dx2425_rank4_n":1,"dx2425_rank5_n":1};
  var seen={},fields=[];KDF.core.concat(KDF[topic]||[]).forEach(function(f){if(!seen[f]){seen[f]=1;fields.push(f);}});
  var lines=[];
  if(isMulti){
    lines.push("COMBINED DATA FOR: "+rows.map(function(r){return cleanName(r.NAME);}).join(", "));
    ["incidents_total","opioid_incidents","polysub_incidents","Opioid","Methamphetamine","Benzodiazepine","Cocaine","Alcohol","visits_6yr","visits_2425","naloxone_opioid_total","est_kits_needed_annual_high","F2018_2025_all_fatal","suicide_attempt_6yr","suicidal_ideation_6yr"].forEach(function(f){
      if(skip[f])return;
      var total=rows.reduce(function(acc,r){return acc+(r[f]!==null&&typeof r[f]==="number"?r[f]:0);},0);
      var sup=rows.filter(function(r){return r.suppress_small_total===1;}).length;
      lines.push(f.replace(/_/g," ")+" (combined): "+total.toLocaleString()+(sup?" ["+sup+" suppressed]":""));
    });
    lines.push("\nPER COUNTY BREAKDOWN:");
    rows.forEach(function(r){
      lines.push("\n"+cleanName(r.NAME)+" County:");
      fields.filter(function(f){return !skip[f];}).forEach(function(f){
        var v=r[f],a=stateAvgs[f];var line=f+": "+fmt(v,f);
        if(a!==undefined&&typeof v==="number"){var flag=v>a*1.1?" ABOVE KS AVG":v<a*0.9?" BELOW KS AVG":" (near KS avg)";line+=" (KS avg: "+fmt(a,f)+flag+")";}
        lines.push("  "+line);
      });
    });
  } else {
    var row=rows[0];
    fields.filter(function(f){return !skip[f];}).forEach(function(f){
      var v=row[f],a=stateAvgs[f];var line=f+": "+fmt(v,f);
      if(a!==undefined&&typeof v==="number"){var flag=v>a*1.1?" ABOVE KS AVG":v<a*0.9?" BELOW KS AVG":" (near KS avg)";line+=" (KS avg: "+fmt(a,f)+flag+")";}
      lines.push(line);
    });
    if(["ed","intervention","core"].includes(topic)){var d6=buildDxBlock(row,"6yr"),d24=buildDxBlock(row,"2425");if(d6)lines.push("\n"+d6);if(d24)lines.push(d24);}
    if(["drugs","network","polysubstance","intervention","core"].includes(topic)){var cb=buildComboBlock(row);if(cb)lines.push("\n"+cb);}
  }
  return lines.join("\n");
}

function buildTractSummary(fips){
  if(!tractData) return null;
  var cn=parseInt(fips.slice(2));
  var tracts=tractData.filter(function(r){return r.COUNTY_FIPS!==null&&parseInt(r.COUNTY_FIPS)===cn;});
  if(!tracts.length) return "No census tract data available.";
  var sup=tracts.filter(function(r){return r.suppress_small_total===1||r.burden_tier===null;});
  var act=tracts.filter(function(r){return r.suppress_small_total!==1&&r.burden_tier!==null;});
  act.sort(function(a,b){return(b.eb_rate_total_per1k||0)-(a.eb_rate_total_per1k||0);});
  var out="CENSUS TRACT BREAKDOWN:\nTotal: "+tracts.length+" | Reportable: "+act.length+" | Suppressed: "+sup.length+"\n\nTOP 5 BY BURDEN:\n";
  act.slice(0,5).forEach(function(t,i){out+=(i+1)+". Tract "+(t.TRACT_FIPS||t.FIPS)+": EB Rate="+fmt(t.eb_rate_total_per1k,"per1k")+", Burden="+(t.burden_tier||"--")+", Ecosystem="+(t.ecosystem_type||"--")+", Hospital Transport="+fmt(t.hospital_rate,"hospital_rate")+"\n";});
  out+="\nTOP 3 BY NALOXONE NEED:\n";
  act.slice().sort(function(a,b){return(b.est_kits_needed_annual_median||0)-(a.est_kits_needed_annual_median||0);}).slice(0,3).forEach(function(t,i){out+=(i+1)+". Tract "+(t.TRACT_FIPS||t.FIPS)+": Kits/yr="+fmt(t.est_kits_needed_annual_median,"")+", Gap="+fmt(t.naloxone_gap,"gap")+"\n";});
  if(sup.length) out+="\n"+sup.length+" tract(s) suppressed.\n";
  out+="\nNOTE: A z-score map of hospital transport rate by census tract is available if requested.";
  return out;
}

function buildTroopSummary(l){
  var t=KHP[l];if(!t||!countyData) return null;
  var suppressed=[],out="KHP "+t.name+" -- "+t.c.length+" counties:\n\n";
  t.c.forEach(function(f){
    var n=FC[f]||f,r=countyData.find(function(x){return padFIPS(x.FIPS)===f;});
    if(!r){out+=n+" County: [No data]\n";return;}
    if(r.suppress_small_total===1){suppressed.push(n);out+=n+" County: [SUPPRESSED]\n";return;}
    out+=n+" County: EMS="+fmt(r.incidents_total,"")+", Rate/1k="+fmt(r.rate_total_per1k,"per1k")+", ED="+fmt(r.visits_6yr,"")+", Burden="+(r.burden_tier||"--")+", Ecosystem="+(r.ecosystem_type||"--")+", Trend="+(r.odmap_trend_flag||"--")+", Naloxone(high)="+fmt(r.est_kits_needed_annual_high,"")+", YoY2025="+fmt(r.odmap_yoy_pct_change_2025,"yoy_pct")+"\n";
  });
  var tr=t.c.map(function(f){return countyData.find(function(r){return padFIPS(r.FIPS)===f&&r.suppress_small_total!==1;});}).filter(Boolean);
  out+="\nTROOP TOTALS:\nEMS: "+tr.reduce(function(a,r){return a+sv(r.incidents_total);},0).toLocaleString()+"\nED: "+tr.reduce(function(a,r){return a+sv(r.visits_6yr);},0).toLocaleString()+"\nNaloxone kits (high): "+tr.reduce(function(a,r){return a+sv(r.est_kits_needed_annual_high);},0).toLocaleString()+"\n";
  if(suppressed.length) out+="Suppressed: "+suppressed.join(", ")+"\n";
  return out;
}

function buildSysPrompt(rows,topic,extra,peers){
  var isMulti=rows.length>1;
  var names=rows.map(function(r){return cleanName(r.NAME);}).join(", ");
  var pops=rows.map(function(r){return(r.population_1||r.POPULATION||0).toLocaleString();}).join(", ");
  var troopLetters=[...new Set(rows.map(function(r){return F2T[padFIPS(r.FIPS)]||"Unknown";}))];
  var troopNames=troopLetters.map(function(l){return KHP[l]?KHP[l].name:l;}).join(", ");
  var peerNote=peers&&peers.length?"\nPEER COUNTIES: "+peers.map(function(p){return cleanName(p.NAME);}).join(", "):"";
  var edRepeatNote=topic==="ed"?"\n- rapid30/90/180_6yr = VISIT-BASED return counts. repeat_within_yr_6yr and frequent_3plus_6yr = PATIENT-BASED. Charts show visit-based only. Mention patient-based in narrative when notable.\n":"";
  var hospNote="\n- hospital_rate = % of EMS incidents resulting in hospital transport. Already a percentage, do not multiply. If notably above or below KS average, mention it and note a z-score tract map is available on request.\n";

  return "You are KODA, the Kansas Overdose Data Assistant -- CDC Foundation ORS.\n\n"+
    (isMulti?"MULTI-COUNTY: "+names+"\nPops: "+pops+"\nKHP: "+troopNames+"\n":"County: "+names+", KS (pop: "+pops+", KHP: "+troopNames+").\n")+
    peerNote+"\n\n"+
    "DATA NOTES:\n"+
    "- EMS/ODMAP 2020–2025 (Kansas Board of EMS). ED visits 2020–2025 (ESSENCE). Fatal OD 2018–2025 (CDC WONDER).\n"+
    "- Rates per 1,000/year. pct_ and hospital_rate fields already in percent form.\n"+
    "- odmap_yoy_pct_change_YYYY fields already in percent form (e.g. 12.4 = 12.4%). Do NOT multiply.\n"+
    "- For naloxone: use HIGH estimate.\n"+
    "- TopCombo table will render; mention top 1-2 in narrative only.\n"+
    "- Dx codes will render in table; mention top finding in narrative only.\n"+
    "- net_bridge_drug = drug connecting most in network.\n"+
    "- Suppressed = small counts, not reportable.\n"+
    edRepeatNote+hospNote+
    "CHART TAGS (include when relevant):\n"+
    "[SHOW:suicide_counts] [SHOW:suicide_pct] [SHOW:ed_age] [SHOW:ed_race] [SHOW:repeat_visit] [SHOW:ed_disposition]\n\n"+
    "COUNTY DATA:\n"+buildDataSummary(rows,topic)+(extra?"\n\nADDITIONAL:\n"+extra:"")+"\n\n"+
    "STYLE: Direct. Exact numbers. Compare to KS avg. 2-4 paragraphs. Worth noting: at end when actionable. No pleasantries."+(isMulti?" Lead with combined totals, then county differences.":"");
}

// ── Chart builders ─────────────────────────────────────────────────────────
function mkChart(title,src){
  var id="ch-"+(++chartCnt),wid="cw-"+id;
  var d=document.createElement("div");d.className="chart-wrapper";d.id=wid;
  d.innerHTML='<div class="chart-title">'+title+'</div><canvas id="'+id+'" style="max-height:280px"></canvas><div class="chart-source">'+src+'</div><button class="dl-btn" id="dlb-'+id+'">&#8681; Download</button>';
  setTimeout(function(){var btn=document.getElementById("dlb-"+id);if(btn)btn.onclick=function(){html2canvas(document.getElementById(wid),{backgroundColor:"#ffffff",scale:2}).then(function(cv){var a=document.createElement("a");a.download="KODA_"+title.replace(/[^a-zA-Z0-9]/g,"_").slice(0,60)+".png";a.href=cv.toDataURL("image/png");a.click();});};},300);
  return{div:d,id:id};
}
function lineChart(title,src,labels,datasets){var w=mkChart(title,src);setTimeout(function(){new Chart(document.getElementById(w.id),{type:"line",data:{labels:labels,datasets:datasets},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{font:{family:"Arial",size:11}}}},scales:{y:{beginAtZero:true}}}});},80);return w.div;}
function barChart(title,src,labels,datasets,opts){var w=mkChart(title,src);setTimeout(function(){new Chart(document.getElementById(w.id),{type:"bar",data:{labels:labels,datasets:datasets},options:opts||{responsive:true,plugins:{legend:{position:"bottom",labels:{font:{family:"Arial",size:11}}}},scales:{y:{beginAtZero:true}}}});},80);return w.div;}

// FIX: Multi-county choropleth — use statewide quantile breaks, not just selected rows
async function buildMultiCountyChoropleth(selectedFipsArr,countyRows,topic){
  var metric=getChoroMetric(topic);
  var mid="map-"+(++mapCnt);
  var names=countyRows.map(function(r){return cleanName(r.NAME);}).join(", ");

  // Legend
  var legend;
  if(metric.ecoMode) legend=ECO_LEGEND;
  else if(metric.burdenMode) legend=[["Very High",ORS.dkred],["High",ORS.red],["Moderate",ORS.orange],["Low",ORS.yellow],["Minimal",ORS.green],["Suppressed (hatch)","#bdc3c7"],["Not Selected","#E7E9EC"]];
  else legend=[["Top 10% statewide",ORS.dkred],["75th-90th",ORS.red],["50th-75th",ORS.orange],["25th-50th",ORS.yellow],["Below 25th","#E5EEF1"],["Suppressed (hatch)","#bdc3c7"],["Not Selected","#E7E9EC"]];

  var w=mkMapWrapper(mid,metric.label+" by County — "+names,legend,"Source: ODMAP 2020-2025 | Kansas ORS",names+"_Map","county-map");
  var selSet=new Set(selectedFipsArr);

  // Compute statewide quantile breaks for numeric metrics
  var numBreaks=null;
  if(!metric.categorical&&countyData){
    var allVals=countyData.filter(function(r){return r.suppress_small_total!==1&&r[metric.field]!=null;}).map(function(r){return sv(r[metric.field]);}).filter(function(v){return v>0;}).sort(function(a,b){return a-b;});
    if(allVals.length>=10){
      function qv(arr,q){return arr[Math.floor(arr.length*q)]||0;}
      numBreaks=[qv(allVals,.25),qv(allVals,.5),qv(allVals,.75),qv(allVals,.9)];
    }
  }

  w._init=async function(){
    try{
      var geo=await fetchCountyGeo();if(!geo||!geo.features||!geo.features.length)return;
      var map=L.map(mid,{zoomControl:true,attributionControl:false});
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",{maxZoom:10}).addTo(map);
      var hatch=addHatch(map);
      function getColor(r){
        if(!r||r.suppress_small_total===1)return hatch;
        var v=r[metric.field];if(v===null||v===undefined)return "#E5EEF1";
        if(metric.ecoMode) return ecoColor(v);
        if(metric.burdenMode) return burdenColor(v);
        var n=sv(v);
        if(numBreaks){if(n>=numBreaks[3])return ORS.dkred;if(n>=numBreaks[2])return ORS.red;if(n>=numBreaks[1])return ORS.orange;if(n>=numBreaks[0])return ORS.yellow;return "#E5EEF1";}
        return ORS.blue;
      }
      var selFeatures=[];
      L.geoJSON(geo,{
        style:function(f){var fips="20"+String(f.properties.COUNTY||"").padStart(3,"0");var r=countyData.find(function(x){return padFIPS(x.FIPS)===fips;});if(!selSet.has(fips))return{fillColor:"#E7E9EC",weight:0.5,color:"#ccc",fillOpacity:0.4};var isSup=r&&r.suppress_small_total===1;return{fillColor:isSup?hatch:getColor(r),weight:2.5,color:"#325379",fillOpacity:isSup?1:0.88};},
        onEachFeature:function(f,lyr){
          var fips="20"+String(f.properties.COUNTY||"").padStart(3,"0");if(!selSet.has(fips))return;
          var r=countyData.find(function(x){return padFIPS(x.FIPS)===fips;});selFeatures.push(lyr);
          if(r){var val=r[metric.field];var dv=metric.categorical?(val||"--"):fmt(val,metric.field);
            lyr.bindTooltip("<strong>"+cleanName(r.NAME||f.properties.NAME)+" County</strong><br/>"+metric.label+": "+dv,{permanent:true,direction:"center",className:"county-label"});
            lyr.bindPopup("<strong>"+cleanName(r.NAME||f.properties.NAME)+" County</strong><br/>"+metric.label+": "+dv+"<br/>EB Rate/1k: "+fmt(r.odmap_eb_rate_total_per1k,"per1k")+"<br/>Burden: "+(r.burden_tier||"--")+"<br/>Ecosystem: "+(r.ecosystem_type||"--")+(r.suppress_small_total===1?"<br/><em>Data suppressed</em>":""));
          }
        }
      }).addTo(map);
      if(selFeatures.length)map.fitBounds(L.featureGroup(selFeatures).getBounds(),{padding:[40,40]});
    }catch(e){var el=document.getElementById(mid);if(el)el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px">Map unavailable</div>';}
  };
  return w;
}

// ── Chart generation ───────────────────────────────────────────────────────
function genCharts(rows,topic,peers,aiTags,text){
  var charts=[],r=rows[0],isMulti=rows.length>1;
  if(topic==="trends"){charts.push(trendChart(rows,peers));if(!isMulti)charts.push(yoyChart(r));}
  else if(topic==="drugs"){charts.push(drugBarChart(rows));if(!isMulti)charts.push(drugDonut(r));}
  else if(topic==="polysubstance"){var cd=buildComboTable(r);if(cd)charts.push(cd);if(!isMulti)charts.push(drugDonut(r));}
  else if(topic==="fatal"){if(!isMulti)charts.push(fatalChart(r));}
  else if(topic==="spikes"){charts.push(spikeChart(rows));charts.push(trendChart(rows,null));}
  else if(topic==="naloxone"){charts.push(naloxoneChart(rows,peers));}
  else if(topic==="ed"){charts.push(edAgeChart(rows));charts.push(edRaceChart(rows));}
  else if(topic==="demographics"){if(!isMulti)charts.push(demoChart(r));}
  else if(topic==="core"){
    if(isMulti){
      // Multi-county core: comparison bars instead of trend+donut
      multiCompareChart(rows).forEach(function(c){charts.push(c);});
    } else {
      charts.push(trendChart(rows,null));charts.push(drugDonut(r));
    }
  }
  // Conditional
  if(aiTags.indexOf("ed_age")>=0) charts.push(edAgeChart(rows));
  if(aiTags.indexOf("ed_race")>=0) charts.push(edRaceChart(rows));
  if(aiTags.indexOf("suicide_counts")>=0||shouldShowSuicide(r,text||"")){var sc=suicideCountChart(rows);if(sc)charts.push(sc);}
  if(aiTags.indexOf("suicide_pct")>=0||shouldShowSuicide(r,text||"")){var sp=suicidePctChart(rows);if(sp)charts.push(sp);}
  if(aiTags.indexOf("repeat_visit")>=0||shouldShowRepeatVisit(r,text||"")){var rv=repeatVisitChart(rows);if(rv)charts.push(rv);}
  // FIX: ed_disposition only for single-county, not multi
  if(aiTags.indexOf("ed_disposition")>=0&&!isMulti){var ed=edDispositionChart(rows);if(ed)charts.push(ed);}
  if(["ed","core"].indexOf(topic)>=0&&!isMulti){var dxt=buildDxTable(r);if(dxt)dxt.forEach(function(t){charts.push(t);});}
  if(["drugs","polysubstance","core"].indexOf(topic)>=0&&!isMulti){var ct=buildComboTable(r);if(ct)charts.push(ct);}
  // Deduplicate
  var seen=new Set(),out=[];charts.filter(Boolean).forEach(function(c){if(!seen.has(c)){seen.add(c);out.push(c);}});
  return out;
}

  var m=text.match(/Worth noting:([\s\S]+?)(?:\n\n|$)/);var main=text,wh="";
  if(m){main=text.replace(m[0],"").trim();wh='<div class="worth-noting"><strong>Worth noting:</strong>'+m[1]+'</div>';}
  return main.split(/\n\n+/).filter(function(p){return p.trim();}).map(function(p){return"<p>"+p.trim()+"</p>";}).join("")+wh;
}
async function callAI(prompt,retries){
  retries=retries||2;
  for(var i=0;i<retries;i++){
    var res=await fetch(WORKER+"/gemini",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    var d=await res.json();
    if(d.error){var msg=d.error.message||"";if((msg.includes("high demand")||msg.includes("overloaded")||msg.includes("429"))&&i<retries-1){await new Promise(function(r){setTimeout(r,6000);});continue;}throw new Error(msg);}
    return d.candidates[0].content.parts[0].text||"No response generated.";
  }
}

// ── Main handler ───────────────────────────────────────────────────────────
async function handleSend(){
  if(isLoading||!countyData)return;
  var inp=document.getElementById("user-input"),text=inp.value.trim();if(!text)return;
  inp.value="";isLoading=true;document.getElementById("send-btn").disabled=true;
  addMsg("user","<p>"+text+"</p>");chatStarted=true;

  var locs=detectLocs(text);
  if(locs.length){sessionFIPS=locs[0].fips;sessionCountyName=locs[0].countyName;}
  var topic=detectTopic(text);
  var troopL=detectTroop(text);
  var isTroopRequest=/\btroop\b|\bkhp\b|\bhighway patrol\b/.test(text.toLowerCase());

  // Context-aware: if no explicit troop letter but we have a session troop,
  // and the message is a follow-up question (no county detected, troop-related or general),
  // resolve using session troop
  var isFollowUp=!locs.length&&!troopL;
  if(isFollowUp&&sessionTroop){
    // If the question is clearly about a county-level topic without geography,
    // treat it as a troop follow-up
    var troopFollowUpPatterns=/naloxone|narcan|kit|burden|highest|ecosystem|drug|trend|ed |emergency|visit|death|fatal|spike|which county|what county/i;
    if(troopFollowUpPatterns.test(text)) troopL=sessionTroop;
  }
  // Statewide highest burden: no session context → find top county statewide
  var isStatewideQuery=/which county|what county/.test(text.toLowerCase())&&!sessionTroop&&!locs.length;
  addTyping();

  try{
    if(!sessionFIPS&&!isTroopRequest){
      var r=await callAI("User said: \""+text+"\". No Kansas county mentioned. Ask which county or city they work in. KODA. Direct, 1-2 sentences.");
      rmTyping();addMsg("koda",fmtResponse(r));
    }
    else if(isTroopRequest){
      if(!troopL){
        rmTyping();var bubble=addMsg("koda","<p>Here's an overview of overdose activity across all KHP Troop areas (2020–2025). Select a troop below for a full breakdown including county rates, naloxone needs, ED age patterns, and ecosystem map.</p>","Statewide KHP Overview");
        if(bubble){bubble.appendChild(troopEMSChart());bubble.appendChild(troopEDChart());}
        addSuggestions(["Troop A - Olathe (KC Metro)","Troop B - Topeka (NE Kansas)","Troop C - Salina (N Central)","Troop D - Hays (NW Kansas)","Troop E - Garden City (SW Kansas)","Troop F - Wichita (S Central)","Troop H - Chanute (SE Kansas)"]);
      } else {
        var ts=buildTroopSummary(troopL);
        var ta=await callAI("You are KODA.\n\nKHP "+KHP[troopL].name+":\n"+ts+"\n\nSummarize: highest burden counties (with numbers), ecosystem types, YoY trends, ED vs EMS, suppressed counties. State total EMS, ED, naloxone kits. Worth noting: insight. Skip pleasantries.");
        rmTyping();var parsed=parseAITags(ta);var b2=addMsg("koda",fmtResponse(parsed.text),"KHP "+KHP[troopL].name);
        if(b2){b2.appendChild(troopRateChart(troopL));b2.appendChild(troopNaloxoneChart(troopL));var teac=troopEDAgeChart(troopL);if(teac)b2.appendChild(teac);var tsc=troopSuicideChart(troopL);if(tsc)b2.appendChild(tsc);var em=await buildTroopEcoMap(troopL);if(em){b2.appendChild(em);setTimeout(function(){em._init();},100);}}
        addSuggestions(["Which county in this troop has the highest burden?","Tell me about naloxone needs in this troop","Which counties are trending up?"]);
      }
    }
    else{
      var allLocs=detectLocs(text);var rows=[];
      if(allLocs.length>1){allLocs.forEach(function(loc){var r=countyData.find(function(x){return padFIPS(x.FIPS)===loc.fips;});if(r)rows.push(r);});}
      else{var single=countyData.find(function(r){return padFIPS(r.FIPS)===sessionFIPS;});if(single)rows=[single];}

      if(!rows.length){rmTyping();addMsg("koda","<p>No data found. Please try again.</p>");}
      else{
        var isMulti=rows.length>1;
        var tag=isMulti?rows.map(function(r){return cleanName(r.NAME);}).join(", "):cleanName(rows[0].NAME);
        var peers=isMulti?[]:getPeers(sessionFIPS,3);
        var extra=null,tractMap=null,ebMap=null,ecoMap=null,naloxMap=null,hospMap=null;
        var multiChoroMap=null,multiTractMap=null;
        var shownTractMap=false,shownEcoMap=false;

        // Check if user is asking for hospital transport map
        var wantsHospMap=/hospital.*transport|transport.*map|z.?score.*transport|transport.*z.?score/.test(text.toLowerCase());

        if(isMulti){
          var selectedFipsArr=rows.map(function(r){return padFIPS(r.FIPS);});
          multiChoroMap=await buildMultiCountyChoropleth(selectedFipsArr,rows,topic);
          var contiguous=areAllContiguous(selectedFipsArr);
          // For ecosystem/network queries, always offer tract eco map if contiguous
          var wantsTractMap=topic==="tract"||/map|tract|neighborhood|where/.test(text.toLowerCase());
          var wantsEco=topic==="network"||topic==="drugs"||/ecosystem/.test(text.toLowerCase());
          if(contiguous&&(wantsTractMap||wantsEco)){
            multiTractMap=await buildMultiCountyTractMap(rows,wantsEco);
            shownTractMap=true;shownEcoMap=wantsEco;
          }
        } else {
          if(wantsHospMap){hospMap=await buildHospitalTransportMap(sessionFIPS,cleanName(rows[0].NAME));}
          else if(topic==="tract"){extra=buildTractSummary(sessionFIPS);tractMap=await buildTractMap(sessionFIPS,cleanName(rows[0].NAME));ebMap=await buildEBRateMap(sessionFIPS,cleanName(rows[0].NAME));shownTractMap=true;}
          else if(topic==="naloxone"){naloxMap=await buildNaloxoneMap(sessionFIPS,cleanName(rows[0].NAME));}
          else if(topic==="drugs"||topic==="network"||topic==="polysubstance"){ecoMap=await buildEcoMap(sessionFIPS,cleanName(rows[0].NAME));shownEcoMap=true;}
          else if(topic==="transport"){hospMap=await buildHospitalTransportMap(sessionFIPS,cleanName(rows[0].NAME));}
          // Offer naloxone map for core queries too via suggestion
        }

        var sp=buildSysPrompt(rows,topic,extra,peers);
        var aiRaw=await callAI(sp+"\n\nUser message: "+text);
        var parsed=parseAITags(aiRaw);
        rmTyping();

        var html=fmtResponse(parsed.text);
        // Tiles: core/network for single; multi-county always gets per-county strips
        if(isMulti){
          html+=renderMultiMetrics(rows);
        } else if(SHOW_TILES_TOPICS.has(topic)){
          html+=renderMetrics(rows[0],["rate_total_per1k","burden_tier","ecosystem_type","odmap_trend_flag","SpikeEvents_2025","est_kits_needed_annual_high","F2018_2025_all_fatal","crude_rate_all_fatal_per100k"]);
        }
        var bub=addMsg("koda",html,tag+(isMulti?" Counties":" County"));

        if(bub){
          if(multiChoroMap){bub.appendChild(multiChoroMap);setTimeout(function(){multiChoroMap._init();},100);}
          if(multiTractMap){bub.appendChild(multiTractMap);setTimeout(function(){multiTractMap._init();},200);}
          if(tractMap){bub.appendChild(tractMap);setTimeout(function(){tractMap._init();},100);}
          if(ebMap){bub.appendChild(ebMap);setTimeout(function(){ebMap._init();},150);}
          if(ecoMap){bub.appendChild(ecoMap);setTimeout(function(){ecoMap._init();},100);}
          if(naloxMap){bub.appendChild(naloxMap);setTimeout(function(){naloxMap._init();},100);}
          if(hospMap){bub.appendChild(hospMap);setTimeout(function(){hospMap._init();},100);}
        }

        var noChart=["tract","troop","intervention","network","transport"];
        if(noChart.indexOf(topic)<0&&bub){
          var charts=genCharts(rows,topic,peers,parsed.tags,text);
          charts.forEach(function(c){if(c)bub.appendChild(c);});
        }

        var suggestions=buildSuggestions(rows,topic,isMulti,shownTractMap,shownEcoMap);
        if(suggestions.length)addSuggestions(suggestions);

        if(isMulti&&!areAllContiguous(rows.map(function(r){return padFIPS(r.FIPS);}))){
          addSuggestions(["Show me a tract map for "+cleanName(rows[0].NAME)+" County","Show me a tract map for "+cleanName(rows[rows.length-1].NAME)+" County"]);
        }
      }
    }
  }catch(e){rmTyping();addMsg("koda","<p>Error: "+e.message+". Please try again.</p>");}
  isLoading=false;document.getElementById("send-btn").disabled=false;document.getElementById("user-input").focus();
}

document.getElementById("send-btn").addEventListener("click",handleSend);
document.getElementById("user-input").addEventListener("keydown",function(e){if(e.key==="Enter")handleSend();});

// ── Init ───────────────────────────────────────────────────────────────────
async function init(){
  try{
    var setMsg=function(m){var el=document.querySelector("#loading-screen .load-msg");if(el)el.textContent=m;};
    setMsg("Loading county data...");
    var r1=await fetch(COUNTY_CSV);if(!r1.ok)throw new Error("County CSV error ("+r1.status+")");
    setMsg("Parsing county data...");
    var all=parseCSV(await r1.text());
    countyData=all.filter(function(r){return r.STATE_ABBR==="KS";});
    if(!countyData.length)throw new Error("No Kansas county records found");
    stateAvgs=calcAvgs(countyData);
    setMsg("Loading tract data...");
    var r2=await fetch(TRACT_CSV);if(!r2.ok)throw new Error("Tract CSV error ("+r2.status+")");
    setMsg("Parsing tract data...");
    tractData=parseCSV(await r2.text());
    // Precompute hospital transport z-score stats from all non-suppressed tracts
    var hospVals=tractData.filter(function(r){return r.hospital_rate!==null&&r.hospital_rate!==undefined&&r.suppress_small_total!==1;}).map(function(r){return r.hospital_rate;});
    if(hospVals.length){
      tractHospMean=hospVals.reduce(function(a,b){return a+b;},0)/hospVals.length;
      var variance=hospVals.reduce(function(acc,v){return acc+Math.pow(v-tractHospMean,2);},0)/hospVals.length;
      tractHospSD=Math.sqrt(variance)||1;
    }
    stateAvgs=calcAvgs(countyData);
    document.getElementById("loading-screen").style.display="none";
    addMsg("koda","<p>Hi, I'm <strong>KODA</strong> — the Kansas Overdose Data Assistant, built by the CDC Foundation's Overdose Response Strategy program.</p><p>I have county-level and census tract-level overdose surveillance data for all of Kansas — EMS incidents (2020–2025), emergency department visits with diagnosis codes and mental health indicators, fatal overdoses (2018–2025), naloxone distribution, drug ecosystem classifications, spike events, hospital transport rates, and more.</p><p>Tell me which county or city you're working in and what you'd like to know.</p>");
    addChips(["Give me an overview of Reno County","Tell me about stimulant trends in Sedgwick County","What is Wyandotte County's drug ecosystem?","Break down overdoses by KHP Troop area","Where is burden highest within Sedgwick County?","Compare Reno, Harvey, and Sedgwick Counties"],true);
  }catch(e){var ls=document.getElementById("loading-screen");if(ls)ls.innerHTML='<div class="logo"><span>&#9654;</span>KODA</div><div class="load-msg" style="color:#f87171;text-align:center;padding:0 24px">Error: '+e.message+'<br><br>Please refresh.</div>';}
}
init();
</script>
