*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#E7E9EC;color:#232D2E;height:100vh;display:flex;flex-direction:column}
header{background:#325379;color:white;padding:14px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:3px solid #F3C108}
.logo{font-size:22px;font-weight:700;letter-spacing:.08em;color:#76ACC1}
.logo span{color:#F3C108;margin-right:6px}
.subtitle{font-size:12px;color:#BCD4DE;line-height:1.4}
.ors-badge{margin-left:auto;font-size:10px;background:rgba(118,172,193,.2);border:1px solid #76ACC1;padding:4px 10px;border-radius:20px;color:#BCD4DE;letter-spacing:.05em}
#chat{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.msg{display:flex;gap:12px;max-width:860px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.user .bubble{background:#325379;color:white;border-radius:18px 18px 4px 18px}
.msg.koda .bubble{background:white;border:1px solid #BFCDDF;border-radius:18px 18px 18px 4px}
.bubble{padding:12px 16px;font-size:14px;line-height:1.7;max-width:740px}
.bubble p{margin-bottom:10px}
.bubble p:last-child{margin-bottom:0}
.worth-noting{background:#E5EEF1;border-left:3px solid #488286;padding:8px 12px;border-radius:0 6px 6px 0;margin-top:10px;font-size:13px;color:#325379}
.bubble strong{font-weight:700}
.avatar{width:32px;height:32px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:2px}
.msg.koda .avatar{background:#325379;color:#76ACC1}
.msg.user .avatar{background:#76ACC1;color:#325379}
.typing{display:flex;align-items:center;gap:4px;padding:14px 16px}
.typing span{width:7px;height:7px;background:#628496;border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:8px;margin-top:12px}
.metric-card{background:#E5EEF1;border-radius:6px;padding:10px 12px;border:1px solid #BFCDDF}
.metric-card .lbl{font-size:10px;color:#628496;margin-bottom:3px;line-height:1.3;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.metric-card .val{font-size:16px;font-weight:700;color:#325379}
.metric-card .val.high{color:#c0392b}
.metric-card .val.low{color:#488286}
.metric-card .cmp{font-size:10px;color:#628496;margin-top:2px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.chip{padding:6px 14px;border-radius:20px;border:1px solid #76ACC1;background:white;font-size:12px;color:#325379;cursor:pointer;transition:all .15s;font-family:Arial,sans-serif}
.chip:hover{background:#325379;color:white;border-color:#325379}
#input-area{padding:16px 24px;background:white;border-top:2px solid #BFCDDF;flex-shrink:0}
#input-row{display:flex;gap:10px;max-width:860px;margin:0 auto}
#user-input{flex:1;padding:12px 16px;border:1px solid #BFCDDF;border-radius:24px;font-size:14px;outline:none;font-family:Arial,sans-serif;color:#232D2E}
#user-input:focus{border-color:#325379}
#send-btn{padding:12px 22px;background:#325379;color:white;border:none;border-radius:24px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif}
#send-btn:hover{background:#488286}
#send-btn:disabled{opacity:.4;cursor:default}
.disclaimer{font-size:11px;color:#628496;text-align:center;margin-top:8px;max-width:860px;margin-left:auto;margin-right:auto}
.county-tag{display:inline-block;background:#BCD4DE;color:#325379;font-size:11px;padding:2px 8px;border-radius:10px;margin-bottom:6px;font-weight:700}
#loading-screen{position:fixed;inset:0;background:#325379;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100}
#loading-screen .logo{font-size:36px}
#loading-screen .load-msg{color:#BCD4DE;font-size:14px}
#loading-screen .spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#76ACC1;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.chart-wrapper{margin-top:14px;background:white;border:1px solid #BFCDDF;border-radius:8px;padding:14px}
.chart-title{font-size:12px;font-weight:700;color:#325379;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.chart-source{font-size:10px;color:#628496;margin-top:6px}
.dl-btn{margin-top:8px;padding:5px 12px;background:#325379;color:white;border:none;border-radius:20px;font-size:11px;cursor:pointer;font-family:Arial,sans-serif;font-weight:700}
.dl-btn:hover{background:#488286}
.tract-map{width:100%;height:320px;border-radius:6px;margin-top:12px;border:1px solid #BFCDDF}
.map-legend{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;align-items:center}
.map-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#628496}
.map-swatch{width:14px;height:14px;border-radius:2px;flex-shrink:0}
.map-title{font-size:12px;font-weight:700;color:#325379;margin-top:12px;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
</style>
</head>

function parseCSV(text){
  var lines=text.split(/\r?\n/);
  if(lines.length<2) return [];
  var headers=lines[0].split(",").map(function(h){return h.trim().replace(/^"|"$/g,"");});
  var rows=[];
  for(var i=1;i<lines.length;i++){
    if(!lines[i].trim()) continue;
    var vals=[],cur="",inQ=false;
    for(var ci=0;ci<lines[i].length;ci++){
      var c=lines[i][ci];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){vals.push(cur);cur="";}
      else cur+=c;
    }
    vals.push(cur);
    var row={};
    headers.forEach(function(h,idx){
      var v=(vals[idx]||"").trim().replace(/^"|"$/g,"");
      if(v===""||v==="NULL"||v==="null"||v==="NA") row[h]=null;
      else if(!isNaN(v)&&v!=="") row[h]=parseFloat(v);
      else row[h]=v;
    });
    rows.push(row);
  }
  return rows;
}

function calcAvgs(rows){
  var a={};
  if(!rows.length) return a;
  Object.keys(rows[0]).forEach(function(k){
    var vals=rows.map(function(r){return r[k];}).filter(function(v){return v!==null&&typeof v==="number"&&!isNaN(v);});
    if(vals.length) a[k]=vals.reduce(function(x,y){return x+y;},0)/vals.length;
  });
  return a;
}

function padFIPS(v){return v===null||v===undefined?null:String(parseInt(v)).padStart(5,"0");}
function sv(v){return(v===null||v===undefined||isNaN(v))?0:v;}

function fmt(v,f){
  if(v===null||v===undefined) return "--";
  if(typeof v==="string") return v;
  if(f&&(f.includes("pct_")||f.includes("yoy_pct")||f.includes("_cagr")||f.includes("cagr_raw"))){var x=Math.abs(v)<=5?v*100:v;return x.toFixed(1)+"%";}
  if(f&&(f.includes("per1k")||(f.includes("_rate")&&!f.includes("visits"))||f.includes("gap")||f.includes("density")||f.includes("p_opioid")||f.includes("p_stimulant")||f.includes("confidence"))) return v.toFixed(2);
  return typeof v==="number"?(v%1===0?v.toLocaleString():v.toFixed(1)):v;
}

function detectLoc(text){
  var l=text.toLowerCase();
  var ck=Object.keys(CF);
  for(var i=0;i<ck.length;i++){var c=ck[i];if(l.includes(c.toLowerCase()+" county")||l.includes(c.toLowerCase())) return {fips:CF[c],countyName:c};}
  var cityk=Object.keys(CityF);
  for(var j=0;j<cityk.length;j++){if(l.includes(cityk[j])) return {fips:CityF[cityk[j]],countyName:FC[CityF[cityk[j]]]};}
  return null;
}

function detectTroop(text){var m=text.toLowerCase().match(/troop\s+([a-h])\b/i);return m?m[1].toUpperCase():null;}

function detectTopic(t){
  t=t.toLowerCase();
  if(/tract|neighborhood|hotspot|where.*burden|where.*highest|census/.test(t)) return "tract";
  if(/troop|khp|highway patrol/.test(t)) return "troop";
  if(/diagnosis|dx|icd|code/.test(t)) return "ed";
  if(/polysubstance|combination|combo|co-use|multiple drug/.test(t)) return "polysubstance";
  if(/naloxone|narcan|kit|distribution|gap/.test(t)) return "naloxone";
  if(/fatal|death|died|mortality/.test(t)) return "fatal";
  if(/ed |emergency|hospital|essence|visit/.test(t)) return "ed";
  if(/demographic|age|gender|race|hispanic|youth|teen/.test(t)) return "demographics";
  if(/spike|ears|surge|cluster/.test(t)) return "spikes";
  if(/network|ecosystem|bridge|dominant/.test(t)) return "network";
  if(/trend|year.over.year|yoy|change|trajectory|getting worse|improving/.test(t)) return "trends";
  if(/meth|opioid|fentanyl|benzo|cocaine|alcohol|drug|substance/.test(t)) return "drugs";
  if(/intervention|strategy|program|prevention|abatement|plan|fund/.test(t)) return "intervention";
  return "core";
}

function getPeers(fips,n){
  n=n||3;
  if(!countyData) return [];
  var row=countyData.find(function(r){return padFIPS(r.FIPS)===fips;});
  if(!row) return [];
  var pop=row.population_1||row.POPULATION||0,burden=row.burden_tier||"",eco=row.ecosystem_type||"",nb=ADJ[fips]||[];
  var scored=countyData.filter(function(r){return padFIPS(r.FIPS)!==fips&&r.suppress_small_total!==1;}).map(function(r){
    var rf=padFIPS(r.FIPS),sc=0,rp=r.population_1||r.POPULATION||0;
    if(pop>0&&Math.abs(rp-pop)/pop<0.5) sc+=3; else if(pop>0&&Math.abs(rp-pop)/pop<1.0) sc+=1;
    if(r.burden_tier&&r.burden_tier===burden) sc+=2;
    if(r.ecosystem_type&&r.ecosystem_type===eco) sc+=2;
    if(nb.indexOf(rf)>=0) sc+=2;
    return {row:r,sc:sc};
  });
  scored.sort(function(a,b){return b.sc-a.sc;});
  return scored.slice(0,n).map(function(s){return s.row;});
}

function buildDxBlock(row,sfx){
  var lbl=sfx==="6yr"?"2020-2025":"2024-25",e=[];
  for(var i=1;i<=5;i++){var c=row["dx"+sfx+"_rank"+i],n=row["dx"+sfx+"_rank"+i+"_n"];if(c&&n!==null)e.push("  "+i+". "+c+" -- "+Math.round(n).toLocaleString()+" visits");}
  return e.length?"Top ED Diagnosis Codes ("+lbl+"):\n"+e.join("\n"):null;
}

function buildComboBlock(row){
  var e=[];
  for(var i=1;i<=5;i++){var c=row["TopCombo_"+i],n=row["TopCombo_"+i+"_Incidents"];if(c&&n!==null)e.push("  "+i+". "+c+" -- "+Math.round(n).toLocaleString()+" incidents");}
  return e.length?"Top Polysubstance Combinations by Incident Count (2020-2025):\n"+e.join("\n"):null;
}

function buildDataSummary(row,topic){
  var skip={"TopCombo_1":1,"TopCombo_2":1,"TopCombo_3":1,"TopCombo_4":1,"TopCombo_5":1,"TopCombo_1_Incidents":1,"TopCombo_2_Incidents":1,"TopCombo_3_Incidents":1,"TopCombo_4_Incidents":1,"TopCombo_5_Incidents":1,"dx6yr_rank1":1,"dx6yr_rank2":1,"dx6yr_rank3":1,"dx6yr_rank4":1,"dx6yr_rank5":1,"dx6yr_rank1_n":1,"dx6yr_rank2_n":1,"dx6yr_rank3_n":1,"dx6yr_rank4_n":1,"dx6yr_rank5_n":1,"dx2425_rank1":1,"dx2425_rank2":1,"dx2425_rank3":1,"dx2425_rank4":1,"dx2425_rank5":1,"dx2425_rank1_n":1,"dx2425_rank2_n":1,"dx2425_rank3_n":1,"dx2425_rank4_n":1,"dx2425_rank5_n":1};
  var seen={},fields=[];
  KDF.core.concat(KDF[topic]||[]).forEach(function(f){if(!seen[f]){seen[f]=1;fields.push(f);}});
  var lines=fields.filter(function(f){return !skip[f];}).map(function(f){
    var v=row[f],a=stateAvgs[f],lbl=FL[f]||f,line=lbl+": "+fmt(v,f);
    if(a!==undefined&&typeof v==="number"){var flag=v>a*1.1?" UP ABOVE KS AVG":v<a*0.9?" DOWN BELOW KS AVG":" (near KS avg)";line+=" (KS avg: "+fmt(a,f)+flag+")";}
    return line;
  });
  if(["ed","intervention","core"].includes(topic)){var d6=buildDxBlock(row,"6yr"),d24=buildDxBlock(row,"2425");if(d6)lines.push("\n"+d6);if(d24)lines.push(d24);}
  if(["drugs","network","polysubstance","intervention","core"].includes(topic)){var cb=buildComboBlock(row);if(cb)lines.push("\n"+cb);}
  return lines.join("\n");
}

function buildTractSummary(fips){
  if(!tractData) return null;
  var cn=parseInt(fips.slice(2));
  var tracts=tractData.filter(function(r){return r.COUNTY_FIPS!==null&&parseInt(r.COUNTY_FIPS)===cn;});
  if(!tracts.length) return "No census tract data available.";
  var sup=tracts.filter(function(r){return r.suppress_small_total===1||r.burden_tier===null;});
  var act=tracts.filter(function(r){return r.suppress_small_total!==1&&r.burden_tier!==null;});
  act.sort(function(a,b){return(b.eb_rate_total_per1k||0)-(a.eb_rate_total_per1k||0);});
  var top5=act.slice(0,5),topN=act.slice().sort(function(a,b){return(b.est_kits_needed_annual_median||0)-(a.est_kits_needed_annual_median||0);}).slice(0,3);
  var out="CENSUS TRACT BREAKDOWN:\nTotal: "+tracts.length+" | Reportable: "+act.length+" | Suppressed: "+sup.length+"\n\nTOP 5 BY BURDEN:\n";
  top5.forEach(function(t,i){out+=(i+1)+". Tract "+(t.TRACT_FIPS||t.FIPS)+": EB Rate="+fmt(t.eb_rate_total_per1k,"per1k")+", Burden="+(t.burden_tier||"--")+", Ecosystem="+(t.ecosystem_type||"--")+", Incidents="+fmt(t.incidents_total,"")+"\n";});
  out+="\nTOP 3 BY NALOXONE NEED:\n";
  topN.forEach(function(t,i){out+=(i+1)+". Tract "+(t.TRACT_FIPS||t.FIPS)+": Kits/yr="+fmt(t.est_kits_needed_annual_median,"")+", Gap="+fmt(t.naloxone_gap,"gap")+", Expected OD/yr="+fmt(t.expected_opioid_ods_annual,"")+"\n";});
  if(sup.length) out+="\n"+sup.length+" tract(s) suppressed.\n";
  return out;
}

function buildTroopSummary(l){
  var t=KHP[l];if(!t||!countyData) return null;
  var out="KHP "+t.name+" -- "+t.c.length+" counties:\n\n";
  t.c.forEach(function(f){
    var n=FC[f]||f,r=countyData.find(function(x){return padFIPS(x.FIPS)===f;});

function mkChart(title,src){
  var id="ch-"+(++chartCnt),wid="cw-"+id;
  var d=document.createElement("div");d.className="chart-wrapper";d.id=wid;
  d.innerHTML='<div class="chart-title">'+title+'</div><canvas id="'+id+'" style="max-height:260px"></canvas><div class="chart-source">'+src+'</div><button class="dl-btn" id="dlb-'+id+'">&#8681; Download</button>';
  // attach download after DOM insert via timeout
  setTimeout(function(){
    var btn=document.getElementById("dlb-"+id);
    if(btn) btn.onclick=function(){
      var el=document.getElementById(wid);
      if(el) html2canvas(el,{backgroundColor:"#ffffff",scale:2}).then(function(cv){var a=document.createElement("a");a.download="KODA_"+title.replace(/[^a-zA-Z0-9]/g,"_").slice(0,60)+".png";a.href=cv.toDataURL("image/png");a.click();});
    };
  },200);
  return {div:d,id:id};
}

function chartLine(title,src,labels,datasets){

}

}

function chartDonut(title,src,labels,data){
  var w=mkChart(title,src);
  setTimeout(function(){new Chart(document.getElementById(w.id),{type:"doughnut",data:{labels:labels,datasets:[{data:data,backgroundColor:CC,borderWidth:2,hoverOffset:6}]},options:{responsive:true,cutout:"60%",plugins:{legend:{position:"right",labels:{font:{family:"Arial",size:11}}}}}});},60);
  return w.div;
}

function chartHBar(title,src,labels,data,colors){
  var w=mkChart(title,src);
  setTimeout(function(){new Chart(document.getElementById(w.id),{type:"bar",data:{labels:labels,datasets:[{label:"Count",data:data,backgroundColor:colors||ORS.blue,borderRadius:4}]},options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true}}}});},60);
  return w.div;
}

// Specific chart builders
function trendChart(row,peers){
  var yrs=["2020","2021","2022","2023","2024","2025"];
  var cD=yrs.map(function(y){return sv(row["rate_"+y+"_per1k"]);});
  var ksD=yrs.map(function(y){return sv(stateAvgs["rate_"+y+"_per1k"]);});
  var ds=[
    {label:row.NAME+" County",data:cD,borderColor:ORS.blue,backgroundColor:ORS.lb,fill:false,tension:.3,borderWidth:2.5,pointRadius:4},
    {label:"Kansas Average",data:ksD,borderColor:ORS.gray,backgroundColor:"transparent",borderDash:[6,3],fill:false,tension:.3,borderWidth:1.5,pointRadius:3}
  ];
  if(peers) peers.slice(0,2).forEach(function(p,i){ds.push({label:p.NAME+" Co.",data:yrs.map(function(y){return sv(p["rate_"+y+"_per1k"]);}),borderColor:[ORS.teal,ORS.purple][i],backgroundColor:"transparent",borderDash:[3,3],fill:false,tension:.3,borderWidth:1.5,pointRadius:2});});
  return chartLine("OD Rate Trend (per 1,000) -- "+row.NAME+" County vs Kansas Average",DS.trends,yrs,ds);
}

function yoyChart(row){
  var yrs=["2021","2022","2023","2024","2025"];
  var vals=yrs.map(function(y){var v=row["odmap_yoy_pct_change_"+y];if(v===null||v===undefined) return 0;return Math.abs(v)<=5?v*100:v;});
  var colors=vals.map(function(v){return v>=0?ORS.red:ORS.teal2;});
  return chartBar("Year-over-Year % Change in OD Incidents -- "+row.NAME+" County",DS.trends,yrs,[{label:"YoY % Change",data:vals,backgroundColor:colors,borderRadius:4}],{responsive:true,plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:"% Change from Prior Year",font:{family:"Arial",size:11}}}}});
}

function drugBarChart(row){
  var use2425=row.suppress_small_total!==1&&(row.Sum2425_Opioid||row.Sum2425_Meth);
  var lbls=["Opioid","Meth","Benzo","Alcohol","Cocaine","Synth MJ"];
  var vals=use2425?[sv(row.Sum2425_Opioid),sv(row.Sum2425_Meth),sv(row.Sum2425_Benzo),sv(row.Sum2425_Alcohol),sv(row.Sum2425_Cocaine),sv(row.Sum2425_SynthCan)]:[sv(row.Opioid),sv(row.Methamphetamine),sv(row.Benzodiazepine),sv(row.Alcohol),sv(row.Cocaine),sv(row.Synthetic_Marijuana)];
  var period=use2425?"2024-25":"2020-2025";
  return chartBar("Drug Type Incidents ("+period+") -- "+row.NAME+" County",DS.drugs,lbls,[{label:"Incidents",data:vals,backgroundColor:CC,borderRadius:4}],{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,title:{display:true,text:"Incidents",font:{family:"Arial",size:11}}}}});
}

function drugDonut(row){
  var use2425=row.suppress_small_total!==1&&(row.Sum2425_Opioid||row.Sum2425_Meth);
  var lbls=["Opioid","Meth","Benzo","Alcohol","Cocaine","Synth MJ"];
  var vals=use2425?[sv(row.Sum2425_Opioid),sv(row.Sum2425_Meth),sv(row.Sum2425_Benzo),sv(row.Sum2425_Alcohol),sv(row.Sum2425_Cocaine),sv(row.Sum2425_SynthCan)]:[sv(row.Opioid),sv(row.Methamphetamine),sv(row.Benzodiazepine),sv(row.Alcohol),sv(row.Cocaine),sv(row.Synthetic_Marijuana)];
  return chartDonut("Drug Mix -- "+row.NAME+" County ("+(use2425?"2024-25":"2020-2025")+")",DS.drugs,lbls,vals);
}

function fatalChart(row){
  var yrs=["2018","2019","2020","2021","2022","2023","2024","2025"];
  var aD=yrs.map(function(y){return sv(row["F"+y+"_all_fatal"]);});
  var oD=yrs.map(function(y){return sv(row["F"+y+"_opioid"]);});
  return chartLine("Fatal Overdose Trend -- "+row.NAME+" County (2018-2025)",DS.fatal,yrs,[
    {label:"All Fatal ODs",data:aD,borderColor:ORS.blue,backgroundColor:ORS.lb,fill:false,tension:.3,borderWidth:2.5,pointRadius:4},
    {label:"Opioid Fatal ODs",data:oD,borderColor:ORS.red,backgroundColor:"transparent",fill:false,tension:.3,borderWidth:2,pointRadius:3}
  ]);

function spikeChart(row){
  var yrs=["2021","2022","2023","2024","2025"];
  var cD=yrs.map(function(y){return sv(row["SpikeEvents_"+y]);});
  var ksD=yrs.map(function(y){return sv(stateAvgs["SpikeEvents_"+y]);});
  return chartBar("EARS Spike Events -- "+row.NAME+" County vs Kansas Average",DS.spikes,yrs,[
    {label:row.NAME+" County",data:cD,backgroundColor:ORS.blue,borderRadius:4},
    {label:"Kansas Average",data:ksD,backgroundColor:ORS.lb,borderRadius:4}

function comboDonut(row){
  var lbls=[],vals=[];
  for(var i=1;i<=5;i++){var c=row["TopCombo_"+i],n=row["TopCombo_"+i+"_Incidents"];if(c&&n){lbls.push(c);vals.push(sv(n));}}
  if(!lbls.length) return null;
  return chartDonut("Top Polysubstance Combinations -- "+row.NAME+" County (2020-2025)",DS.polysubstance,lbls,vals);
}

function rateCompareChart(row,peers,title,src){
  var lbls=[row.NAME],vals=[sv(row.rate_total_per1k)];
  if(peers) peers.forEach(function(p){lbls.push(p.NAME);vals.push(sv(p.rate_total_per1k));});
  lbls.push("KS Average");vals.push(sv(stateAvgs.rate_total_per1k));
  var colors=vals.map(function(v,i){return i===0?ORS.blue:i===vals.length-1?ORS.gray:ORS.teal;});
  return chartBar((title||"OD Rate per 1,000 -- "+row.NAME+" vs Peers & KS Average"),(src||DS.core),lbls,[{label:"Rate per 1,000 (2020-2025)",data:vals,backgroundColor:colors,borderRadius:4}],{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,title:{display:true,text:"Rate per 1,000",font:{family:"Arial",size:11}}}}});
}

function edCompChart(row){
  var lbls=["Opioid %","Stimulant %","Alcohol %","Polysubstance %","Mental Health %"];
  var cD=[sv(row.pct_opioid_6yr)*100,sv(row.pct_stimulant_6yr)*100,sv(row.pct_alcohol_6yr)*100,sv(row.pct_polysubstance_6yr)*100,sv(row.pct_mental_health_6yr)*100];
  var ksD=[sv(stateAvgs.pct_opioid_6yr)*100,sv(stateAvgs.pct_stimulant_6yr)*100,sv(stateAvgs.pct_alcohol_6yr)*100,sv(stateAvgs.pct_polysubstance_6yr)*100,sv(stateAvgs.pct_mental_health_6yr)*100];
  return chartBar("ED Visit Composition (% of Visits) -- "+row.NAME+" County vs KS Average",DS.ed,lbls,[
    {label:row.NAME+" County",data:cD,backgroundColor:ORS.blue,borderRadius:4},
    {label:"Kansas Average",data:ksD,backgroundColor:ORS.lb,borderRadius:4}
  ]);
}

function demoChart(row){
  var lbls=["Age 25-34","Age 35-44","Age 45-54","Male","Female","Hispanic","NH White","NH Black"];
  var vals=[sv(row.F25to34_2018_2025),sv(row.F35to44_2018_2025),sv(row.F45to54_2018_2025),sv(row.male_2018_2025),sv(row.female_2018_2025),sv(row.hispanic_2018_2025),sv(row.NH_White_2018_2025),sv(row.NH_Black_2018_2025)];
  return chartHBar("Fatal OD Demographics (2018-2025) -- "+row.NAME+" County",DS.demographics,lbls,vals,CC);
}

function genCharts(row,topic,peers){
  var charts=[];
  if(topic==="trends"){charts.push(trendChart(row,peers));charts.push(yoyChart(row));}
  else if(topic==="drugs"){charts.push(drugBarChart(row));charts.push(drugDonut(row));}
  else if(topic==="polysubstance"){charts.push(comboDonut(row));charts.push(drugDonut(row));}
  else if(topic==="fatal"){charts.push(fatalChart(row));}
  else if(topic==="spikes"){charts.push(spikeChart(row));charts.push(trendChart(row,null));}
  else if(topic==="ed"){charts.push(edCompChart(row));}
  else if(topic==="demographics"){charts.push(demoChart(row));}
  else if(topic==="core"){charts.push(trendChart(row,null));charts.push(drugDonut(row));}
  return charts.filter(function(c){return c!==null;});
}

// ── Maps ───────────────────────────────────────────────────────────────────
function getBurdenColor(tier){
  if(!tier) return "#ecf0f1";var t=tier.toLowerCase();
  if(t.includes("suppressed")) return "#bdc3c7";
  if(t.includes("high")&&t.includes("opioid")) return "#7b0d0d";
  if(t.includes("high")&&t.includes("stimulant")) return "#c0392b";
  if(t.includes("high")&&t.includes("mixed")) return "#e74c3c";
  if(t.includes("high")) return "#e74c3c";
  if(t.includes("moderate")) return "#e67e22";
  if(t.includes("low")) return "#f1c40f";
  if(t.includes("minimal")) return "#2ecc71";
  return "#ecf0f1";
}

function mkMapWrapper(id,title,legendItems,source,dlTitle){
  var w=document.createElement("div");w.id="mw-"+id;
  w.innerHTML='<div class="map-title">'+title+'</div>'+
    '<div id="'+id+'" class="tract-map"></div>'+
    '<div class="map-legend">'+legendItems.map(function(x){return'<div class="map-legend-item"><div class="map-swatch" style="background:'+x[1]+'"></div>'+x[0]+'</div>';}).join("")+'</div>'+
    (source?'<div class="chart-source">'+source+'</div>':'')+
    '<button class="dl-btn" id="dlb-'+id+'">&#8681; Download Map</button>';
  setTimeout(function(){
    var btn=document.getElementById("dlb-"+id);
    if(btn) btn.onclick=function(){var el=document.getElementById("mw-"+id);if(el)html2canvas(el,{backgroundColor:"#ffffff",scale:2}).then(function(cv){var a=document.createElement("a");a.download="KODA_"+dlTitle.replace(/[^a-zA-Z0-9]/g,"_")+".png";a.href=cv.toDataURL("image/png");a.click();});};
  },200);
  return w;
}

async function buildTractMap(fips,cname){
  var cn=parseInt(fips.slice(2)),sn=fips.slice(0,2);
  var tracts=tractData?tractData.filter(function(r){return r.COUNTY_FIPS!==null&&parseInt(r.COUNTY_FIPS)===cn;}):[];
  if(!tracts.length) return null;
  var lkp={};
  tracts.forEach(function(t){var id=String(parseInt(t.TRACT_FIPS||0)).padStart(6,"0");lkp[id]=t;lkp[String(parseInt(t.TRACT_FIPS||0))]=t;});
  var mid="map-"+(++mapCnt);
  var legend=[["High Burden Opioid","#7b0d0d"],["High Burden Stimulant","#c0392b"],["High Burden Mixed","#e74c3c"],["Moderate Burden","#e67e22"],["Low Burden","#f1c40f"],["Minimal Burden","#2ecc71"],["Suppressed","#bdc3c7"],["No Data","#ecf0f1"]];
  var w=mkMapWrapper(mid,"Census Tract Overdose Burden -- "+cname+" County",legend,"Source: ODMAP 2020-2025 | Kansas ORS",cname+"_Tract_Burden_Map");
  w._init=async function(){
    try{
      var gr=await fetch("https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_Census2020/MapServer/8/query?where=STATE%3D'"+sn+"'+AND+COUNTY%3D'"+String(cn).padStart(3,"0")+"'&outFields=TRACT,GEOID&f=geojson&outSR=4326");
      var geo=await gr.json();
      if(!geo.features||!geo.features.length) return;
      var map=L.map(mid,{zoomControl:true,attributionControl:false});
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",{maxZoom:14}).addTo(map);
      var layer=L.geoJSON(geo,{
        style:function(f){var raw=String(parseInt(f.properties.TRACT)),pad=raw.padStart(6,"0"),t=lkp[pad]||lkp[raw],color="#ecf0f1";if(t) color=t.suppress_small_total===1?"#bdc3c7":getBurdenColor(t.burden_tier);return{fillColor:color,weight:1,color:"#fff",fillOpacity:.8};},
        onEachFeature:function(f,lyr){var raw=String(parseInt(f.properties.TRACT)),pad=raw.padStart(6,"0"),t=lkp[pad]||lkp[raw];if(t)lyr.bindPopup("<strong>Tract "+f.properties.TRACT+"</strong><br/>Burden: "+(t.burden_tier||"--")+"<br/>EB Rate/1k: "+fmt(t.eb_rate_total_per1k,"per1k")+"<br/>Incidents (2020-2025): "+fmt(t.incidents_total,"")+"<br/>Ecosystem: "+(t.ecosystem_type||"--")+"<br/>"+(t.suppress_small_total===1?"<em>Suppressed</em>":"Kits/yr: "+fmt(t.est_kits_needed_annual_median,"")));}
      }).addTo(map);
      map.fitBounds(layer.getBounds(),{padding:[10,10]});
    }catch(e){var el=document.getElementById(mid);if(el)el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px">Map unavailable</div>';}
  };
  return w;
}

async function buildNaloxoneMap(fips,cname){
  var cn=parseInt(fips.slice(2)),sn=fips.slice(0,2);
  var tracts=tractData?tractData.filter(function(r){return r.COUNTY_FIPS!==null&&parseInt(r.COUNTY_FIPS)===cn&&r.suppress_small_total!==1;}):[];
  if(!tracts.length) return null;
  var lkp={};
  tracts.forEach(function(t){var id=String(parseInt(t.TRACT_FIPS||0)).padStart(6,"0");lkp[id]=t;lkp[String(parseInt(t.TRACT_FIPS||0))]=t;});
  var kits=tracts.map(function(t){return t.est_kits_needed_annual_median||0;}).filter(function(v){return v>0;});
  var maxK=kits.length?Math.max.apply(null,kits):1;
  function nc(val){if(!val||val===0) return "#E5EEF1";var r=val/maxK;if(r>.75) return "#7b0d0d";if(r>.5) return "#c0392b";if(r>.25) return "#e67e22";return "#f1c40f";}
  var mid="map-"+(++mapCnt);
  var legend=[["Highest Need","#7b0d0d"],["High Need","#c0392b"],["Moderate Need","#e67e22"],["Lower Need","#f1c40f"],["Minimal/No Data","#E5EEF1"]];
  var w=mkMapWrapper(mid,"Naloxone Kit Need by Census Tract -- "+cname+" County",legend,"Source: ODMAP 2020-2025 | Kansas ORS -- Kit estimates based on opioid incident burden",cname+"_Naloxone_Need_Map");
  w._init=async function(){
    try{
      var gr=await fetch("https://tigerweb.geo.census.gov/arcgis/rest/services/TIGERweb/tigerWMS_Census2020/MapServer/8/query?where=STATE%3D'"+sn+"'+AND+COUNTY%3D'"+String(cn).padStart(3,"0")+"'&outFields=TRACT,GEOID&f=geojson&outSR=4326");
      var geo=await gr.json();
      if(!geo.features||!geo.features.length) return;
      var map=L.map(mid,{zoomControl:true,attributionControl:false});
      L.tileLayer("https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png",{maxZoom:14}).addTo(map);
      var layer=L.geoJSON(geo,{
        style:function(f){var raw=String(parseInt(f.properties.TRACT)),pad=raw.padStart(6,"0"),t=lkp[pad]||lkp[raw],color="#E5EEF1";if(t) color=nc(t.est_kits_needed_annual_median);return{fillColor:color,weight:1,color:"#fff",fillOpacity:.85};},
        onEachFeature:function(f,lyr){var raw=String(parseInt(f.properties.TRACT)),pad=raw.padStart(6,"0"),t=lkp[pad]||lkp[raw];if(t)lyr.bindPopup("<strong>Tract "+f.properties.TRACT+"</strong><br/>Kits Needed/yr (median): "+fmt(t.est_kits_needed_annual_median,"")+"<br/>Kits Needed/yr (high): "+fmt(t.est_kits_needed_annual_high,"")+"<br/>Naloxone Gap: "+fmt(t.naloxone_gap,"gap")+"<br/>Expected Opioid ODs/yr: "+fmt(t.expected_opioid_ods_annual,"")+"<br/>Burden: "+(t.burden_tier||"--"));}
      }).addTo(map);
      map.fitBounds(layer.getBounds(),{padding:[10,10]});
    }catch(e){var el=document.getElementById(mid);if(el)el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px">Map unavailable</div>';}
  };
  return w;
}

function renderMetrics(row,fields){
  var cards=fields.map(function(f){
    var v=row[f];if(v===null||v===undefined) return "";
    var a=stateAvgs[f],isN=typeof v==="number";
    var hi=isN&&a!==undefined&&v>a*1.1,lo=isN&&a!==undefined&&v<a*0.9;
    var cmp=isN&&a!==undefined?"KS avg: "+fmt(a,f):"";
    return '<div class="metric-card"><div class="lbl">'+(FL[f]||f)+'</div><div class="val '+(hi?"high":lo?"low":"")+'">'+fmt(v,f)+(hi?" &#9650;":lo?" &#9660;":"")+'</div>'+(cmp?'<div class="cmp">'+cmp+'</div>':'')+' </div>';
  }).join("");
  return '<div class="metric-grid">'+cards+'</div>';
}

var chipGroupId=0;
function addChips(chips){
  var chat=document.getElementById("chat"),div=document.createElement("div"),gid=++chipGroupId;
  div.className="msg koda";

  });

function sendChip(t){
  var d=detectLoc(t);if(d){sessionFIPS=d.fips;sessionCountyName=d.countyName;}
  document.getElementById("user-input").value=t;handleSend();
}

function fmtResponse(text){
  text=text.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>").replace(/\*(.*?)\*/g,"<em>$1</em>");
  var m=text.match(/Worth noting:([\s\S]+?)(?:\n\n|$)/);
  var main=text,wh="";
  if(m){main=text.replace(m[0],"").trim();wh='<div class="worth-noting"><strong>Worth noting:</strong>'+m[1]+'</div>';}
  var p=main.split(/\n\n+/).filter(function(x){return x.trim();}).map(function(x){return"<p>"+x.trim()+"</p>";}).join("");
  return p+wh;
}

async function callAI(prompt,retries){
  retries=retries||2;
  for(var i=0;i<retries;i++){
    var res=await fetch(WORKER+"/gemini",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})});
    var d=await res.json();
    if(d.error){var msg=d.error.message||"";if((msg.includes("high demand")||msg.includes("overloaded")||msg.includes("429"))&&i<retries-1){await new Promise(function(r){setTimeout(r,6000);});continue;}throw new Error(msg);}
    return d.candidates[0].content.parts[0].text||"No response generated.";
  }
}

async function handleSend(){
  if(isLoading||!countyData) return;
  var inp=document.getElementById("user-input"),text=inp.value.trim();
  if(!text) return;
  inp.value="";isLoading=true;document.getElementById("send-btn").disabled=true;
  addMsg("user","<p>"+text+"</p>");
  var det=detectLoc(text);
  if(det){sessionFIPS=det.fips;sessionCountyName=det.countyName;}
  var topic=detectTopic(text),troopL=detectTroop(text);
  addTyping();
  try{
    if(!sessionFIPS&&topic!=="troop"){
      var r=await callAI("User said: \""+text+"\". No Kansas county mentioned. Ask which county or city they work in. You are KODA. Be direct, 1-2 sentences.");
      rmTyping();addMsg("koda",fmtResponse(r));
      addChips(["I'm from Reno County","I'm from Hutchinson","I'm from Sedgwick County","I'm from Wichita","I'm from Wyandotte County","I'm from Johnson County","I'm from Shawnee County"]);
    } else if(topic==="troop"){
      if(!troopL&&!sessionFIPS){
        rmTyping();addMsg("koda","<p>Which KHP Troop area are you interested in?</p>");
        addChips(["Troop A - Olathe (KC Metro)","Troop B - Topeka (NE Kansas)","Troop C - Salina (N Central)","Troop D - Hays (NW Kansas)","Troop E - Garden City (SW Kansas)","Troop F - Wichita (S Central)","Troop H - Chanute (SE Kansas)"]);
      } else {
        var tL=troopL||(sessionFIPS?F2T[sessionFIPS]:null);
        if(!tL){rmTyping();addMsg("koda","<p>Which KHP Troop?</p>");addChips(["Troop A","Troop B","Troop C","Troop D","Troop E","Troop F","Troop H"]);}
        else{
          var ts=buildTroopSummary(tL);
          var ta=await callAI("You are KODA, Kansas Overdose Data Assistant.\n\nKHP "+KHP[tL].name+" data:\n\n"+ts+"\n\nSummarize in 3-4 paragraphs: which counties have highest burden (with numbers), dominant drug trends, year-over-year trends, any suppressed counties. End with Worth noting: about overall pattern. Skip pleasantries.");
          rmTyping();addMsg("koda",fmtResponse(ta),"KHP "+KHP[tL].name);
          addChips(["Which county in this troop has the highest burden?","Tell me about naloxone needs across this troop","What are the dominant drugs in this troop area?","Which counties are trending up?"]);
        }
      }
    } else {
      var row=countyData.find(function(r){return padFIPS(r.FIPS)===sessionFIPS;});
      if(!row){rmTyping();addMsg("koda","<p>No data found for "+sessionCountyName+" County.</p>");}
      else{
        var extra=null,tractMap=null,naloxMap=null;
        var peers=getPeers(sessionFIPS,3);
        if(topic==="tract"){extra=buildTractSummary(sessionFIPS);tractMap=await buildTractMap(sessionFIPS,sessionCountyName);}
        if(topic==="naloxone"){naloxMap=await buildNaloxoneMap(sessionFIPS,sessionCountyName);}
        var sp=buildSysPrompt(row,topic,extra,peers);
        var ai=await callAI(sp+"\n\nUser message: "+text);
        rmTyping();
        var html=fmtResponse(ai);
        if(det) html+=renderMetrics(row,["rate_total_per1k","burden_tier","ecosystem_type","odmap_trend_flag","SpikeEvents_2025","est_kits_needed_annual_high","F2018_2025_all_fatal","crude_rate_all_fatal_per100k"]);
        var bubble=addMsg("koda",html,sessionCountyName);
        if(tractMap&&bubble){bubble.appendChild(tractMap);setTimeout(function(){tractMap._init();},100);}
        if(naloxMap&&bubble){bubble.appendChild(naloxMap);setTimeout(function(){naloxMap._init();},150);}
        var noChart=["tract","troop","intervention","network"];
        if(noChart.indexOf(topic)<0&&bubble){
          var charts=genCharts(row,topic,peers);
          charts.forEach(function(c){if(c)bubble.appendChild(c);});
          if(topic==="naloxone"&&bubble){
            bubble.appendChild(rateCompareChart(row,peers,"Opioid Incident Rate per 1,000 -- "+row.NAME+" vs Peers & KS Average",DS.naloxone));
          }
        }
        addChips(["Where is overdose burden highest within this county?","What drugs are driving overdoses here?","What does our naloxone gap look like?","Tell me about fatal overdoses in our county","What intervention strategies fit our data profile?","Break down overdoses by KHP Troop area"]);
      }
    }
  }catch(e){rmTyping();addMsg("koda","<p>Error: "+e.message+". Please try again.</p>");}
  isLoading=false;document.getElementById("send-btn").disabled=false;document.getElementById("user-input").focus();
}

document.getElementById("send-btn").addEventListener("click",handleSend);
document.getElementById("user-input").addEventListener("keydown",function(e){if(e.key==="Enter")handleSend();});

async function init(){
  try{
    var setMsg=function(m){var el=document.querySelector("#loading-screen .load-msg");if(el)el.textContent=m;};
    setMsg("Loading county data...");
    var r1=await fetch(COUNTY_CSV);
    if(!r1.ok) throw new Error("County CSV error ("+r1.status+")");
    setMsg("Parsing county data...");
    var cText=await r1.text();
    var all=parseCSV(cText);
    countyData=all.filter(function(r){return r.STATE_ABBR==="KS";});
    if(!countyData.length) throw new Error("No Kansas county records found");
    stateAvgs=calcAvgs(countyData);
    setMsg("Loading tract data...");
    var r2=await fetch(TRACT_CSV);
    if(!r2.ok) throw new Error("Tract CSV error ("+r2.status+")");
    setMsg("Parsing tract data...");
    tractData=parseCSV(await r2.text());
    document.getElementById("loading-screen").style.display="none";
    addMsg("koda","<p>Hi, I'm <strong>KODA</strong> -- the Kansas Overdose Data Assistant, built by the CDC Foundation's Overdose Response Strategy program.</p><p>I have county-level and census tract-level overdose data for all of Kansas -- EMS incidents (2020-2025), ED visits with diagnosis codes, fatal overdoses (2018-2025), naloxone distribution, drug trends, spike events, and more. I automatically generate charts and maps alongside responses.</p><p>Tell me which county or city you're working in and what you'd like to know.</p>");
    addChips(["Give me an overview of Reno County","Tell me about stimulant trends in Sedgwick County","What is Wyandotte County's drug ecosystem?","Break down overdoses by KHP Troop area","Where is burden highest within Sedgwick County?"]);
  }catch(e){
    var ls=document.getElementById("loading-screen");
    if(ls) ls.innerHTML='<div class="logo"><span>&#9654;</span>KODA</div><div class="load-msg" style="color:#f87171;text-align:center;padding:0 24px">Error: '+e.message+'<br><br>Please refresh to try again.</div>';
  }
}
init();
</script>
