// Parse CSV text into array of objects
function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g,""));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    // Handle quoted fields
    const vals = [];
    let cur = "", inQ = false;
    for (let c of lines[i]) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { vals.push(cur); cur = ""; }
      else cur += c;
    }
    vals.push(cur);
    const row = {};
    headers.forEach((h, idx) => {
      const v = (vals[idx] || "").trim().replace(/^"|"$/g,"");
      if (v === "" || v === "NULL" || v === "null" || v === "NA") row[h] = null;
      else if (!isNaN(v) && v !== "") row[h] = parseFloat(v);
      else row[h] = v;
    });
    rows.push(row);
  }
  return rows;
}

// Calculate state averages for all numeric fields
function calcStateAvgs(rows) {
  const avgs = {};
  if (!rows.length) return avgs;
  const keys = Object.keys(rows[0]);
  keys.forEach(k => {
    const vals = rows.map(r => r[k]).filter(v => v !== null && typeof v === "number" && !isNaN(v));
    if (vals.length) avgs[k] = vals.reduce((a,b) => a+b, 0) / vals.length;
  });
  return avgs;
}

function padFIPS(val) {
  if (val === null || val === undefined) return null;
  return String(parseInt(val)).padStart(5, "0");
}

function detectLocation(text) {
  const lower = text.toLowerCase();
  // County name first
  for (const [county, fips] of Object.entries(COUNTY_FIPS)) {
    const patterns = [county.toLowerCase() + " county", county.toLowerCase()];
    if (patterns.some(p => lower.includes(p))) return { fips, countyName: county };
  }
  // City name
  for (const [city, fips] of Object.entries(CITY_FIPS)) {
    if (lower.includes(city)) return { fips, countyName: FIPS_COUNTY[fips] };
  }
  return null;
}

function fmt(val, field) {
  if (val === null || val === undefined) return "—";
  if (typeof val === "string") return val;
  if (field && (field.includes("pct_") || field.includes("_cagr") || field.includes("yoy_pct") || field.includes("cagr_2020") || field.includes("cagr_raw"))) {
    const v = Math.abs(val) <= 5 ? val * 100 : val;
    return v.toFixed(1) + "%";
  }
  if (field && (field.includes("per1k") || field.includes("_rate") && !field.includes("visits") || field.includes("ratio") || field.includes("gap") || field.includes("density") || field.includes("jaccard") || field.includes("p_opioid") || field.includes("p_stimulant") || field.includes("confidence"))) {
    return val.toFixed(2);
  }
  return typeof val === "number" ? (Number.isInteger(val) ? val.toLocaleString() : val % 1 === 0 ? val.toLocaleString() : val.toFixed(1)) : val;
}

function detectTopic(text) {
  const t = text.toLowerCase();
  if (/naloxone|narcan|kit|distribution|gap/.test(t)) return "naloxone";
  if (/fatal|death|died|mortality|overdose death/.test(t)) return "fatal";
  if (/ed|emergency|hospital|essence|visit/.test(t)) return "ed";
  if (/demographic|age|gender|race|hispanic|youth|young|teen/.test(t)) return "demographics";
  if (/spike|ears|surge|cluster/.test(t)) return "spikes";
  if (/network|ecosystem|bridge|dominant|polysubstance|combo|combination/.test(t)) return "network";
  if (/trend|cagr|change|year|trajectory|getting worse|improving/.test(t)) return "trends";
  if (/meth|opioid|fentanyl|benzo|cocaine|alcohol|drug|substance/.test(t)) return "drugs";
  if (/intervention|strategy|program|prevention|address|reduce|help|plan/.test(t)) return "intervention";
  return "core";
}

  return fields.map(f => {
    const val = row[f];
    const avg = stateAvgs[f];
    const label = FIELD_LABELS[f] || f;
    let line = `${label}: ${fmt(val, f)}`;
    if (avg !== undefined && typeof val === "number") {
      const flag = val > avg * 1.1 ? " ⬆ ABOVE KS AVG" : val < avg * 0.9 ? " ⬇ BELOW KS AVG" : " (near KS avg)";
      line += ` (KS avg: ${fmt(avg, f)}${flag})`;
    }
    return line;
  }).join("\n");
}

function buildSystemPrompt(row) {
  const county = row.NAME;
  const pop = (row.population_1 || row.POPULATION || 0).toLocaleString();
  const fips = padFIPS(row.FIPS);
  return `You are KODA, the Kansas Overdose Data Assistant — an AI analyst built by the CDC Foundation's Overdose Response Strategy (ORS) program for Kansas.

You are speaking with a community partner, public health professional, law enforcement officer, or prevention coalition member about overdose and substance use data for ${county} County, Kansas (population: ${pop}, FIPS: ${fips}).

LIVE DATA FOR ${county.toUpperCase()} COUNTY:
${buildDataSummary(row)}

YOUR ROLE:
- Respond in plain, accessible language. Avoid jargon unless you explain it.
- Use specific numbers from the data when answering. Never invent data.
- Compare to Kansas state average when relevant — flagged above as ABOVE/BELOW KS AVG.
- Proactively surface 1–2 insights the user didn't ask about but should know.
- When a user describes a problem or intervention idea, engage thoughtfully — help them think through what the data says and what approaches might fit their county's profile.
- Keep responses conversational and focused — 2–4 paragraphs unless a detailed breakdown is needed.
- If data shows "—" or fields are suppressed (suppress_small_total=1), acknowledge that honestly.
- End with a short "Worth noting:" line when there's an important actionable insight.
- You represent ORS and CDC Foundation — be professional but approachable.

Do not make up data not listed above.`;
}

function renderMetrics(row, fields) {
  const cards = fields.map(f => {
    const val = row[f];
    if (val === null || val === undefined) return "";
    const avg = stateAvgs[f];
    const isNum = typeof val === "number";
    const isHigh = isNum && avg !== undefined && val > avg * 1.1;
    const isLow = isNum && avg !== undefined && val < avg * 0.9;
    const compare = isNum && avg !== undefined ? `KS avg: ${fmt(avg, f)}` : "";
    return `<div class="metric-card">
      <div class="label">${FIELD_LABELS[f] || f}</div>
      <div class="value ${isHigh?"high":isLow?"low":""}">${fmt(val,f)}${isHigh?" ▲":isLow?" ▼":""}</div>
      ${compare ? `<div class="compare">${compare}</div>` : ""}
    </div>`;
  }).join("");
  return `<div class="metric-grid">${cards}</div>`;
}

function addMessage(role, html, countyName) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  const tag = countyName ? `<div class="county-tag">${countyName} County</div>` : "";
  div.innerHTML = `<div class="avatar">${role==="koda"?"K":"U"}</div><div class="bubble">${tag}${html}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addTyping() {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg koda"; div.id = "typing-indicator";
  div.innerHTML = `<div class="avatar">K</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() { document.getElementById("typing-indicator")?.remove(); }

function addChips(chips) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg koda";
  div.innerHTML = `<div class="avatar" style="opacity:0">K</div><div class="bubble" style="background:transparent;border:none;padding:4px 0">
    <div class="suggestion-chips">${chips.map(s=>`<button class="chip" onclick="sendChip('${s.replace(/'/g,"&#39;")}')">${s}</button>`).join("")}</div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

window.sendChip = t => { document.getElementById("user-input").value = t; handleSend(); };

function formatResponse(text) {
  const m = text.match(/Worth noting:(.+)/s);
  let main = text, worthHtml = "";
  if (m) { main = text.replace(m[0],"").trim(); worthHtml = `<div class="worth-noting"><strong>Worth noting:</strong>${m[1]}</div>`; }
  const paras = main.split(/\n\n+/).filter(p=>p.trim()).map(p=>`<p>${p.trim()}</p>`).join("");
  return paras + worthHtml;
}

async function callGemini(prompt) {
  const res = await fetch(GEMINI_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "I wasn't able to generate a response.";
}

async function handleSend() {
  if (isLoading || !allData) return;
  const input = document.getElementById("user-input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  isLoading = true;
  document.getElementById("send-btn").disabled = true;

  addMessage("user", `<p>${text}</p>`);

  const detected = detectLocation(text);
  if (detected) { sessionFIPS = detected.fips; sessionCountyName = detected.countyName; }

  addTyping();

  try {
    if (!sessionFIPS) {
      const resp = await callGemini(`The user said: "${text}". They haven't mentioned a Kansas county or city yet. Ask them warmly which county or city they're working in. You are KODA, the Kansas Overdose Data Assistant. Keep it to 2 sentences.`);
      removeTyping();
      addMessage("koda", formatResponse(resp));
      addChips(["I'm from Reno County","I'm from Hutchinson","I'm from Sedgwick County","I'm from Wichita","I'm from Wyandotte County","I'm from Johnson County","I'm from Shawnee County"]);
    } else {
      const row = allData.find(r => padFIPS(r.FIPS) === sessionFIPS);
      if (!row) {
        removeTyping();
        addMessage("koda", `<p>I couldn't find data for ${sessionCountyName} County (FIPS: ${sessionFIPS}). Please try rephrasing or contact ORS for support.</p>`);
      } else {
        const sysPrompt = buildSystemPrompt(row);
        const aiText = await callGemini(sysPrompt + "\n\nUser message: " + text);
        removeTyping();
        let html = formatResponse(aiText);
        if (detected) html += renderMetrics(row, KEY_DISPLAY_FIELDS);
        addMessage("koda", html, sessionCountyName);
        addChips([
          "What drugs are driving overdoses in our county?",
          "How does our trend compare to the state?",
          "What does our naloxone gap mean?",
          "Tell me about fatal overdoses here",
          "What intervention strategies fit our data profile?",
          "What does our drug ecosystem type mean?"
        ]);
      }
    }
  } catch(e) {
    removeTyping();
    addMessage("koda", `<p>I ran into an error: ${e.message}. Please try again in a moment.</p>`);
  }

  isLoading = false;
  document.getElementById("send-btn").disabled = false;
  document.getElementById("user-input").focus();
}

document.getElementById("send-btn").addEventListener("click", handleSend);
document.getElementById("user-input").addEventListener("keydown", e => { if(e.key==="Enter") handleSend(); });

// Load CSV on startup
async function init() {
  try {
    const res = await fetch(COUNTY_CSV_URL);
    if (!res.ok) throw new Error(`Failed to load data (${res.status})`);
    const text = await res.text();
    const parsed = parseCSV(text);
    allData = parsed.filter(r => r.STATE_ABBR === "KS");
    if (!allData.length) throw new Error("No Kansas records found in dataset");
    stateAvgs = calcStateAvgs(allData);
    document.getElementById("loading-screen").style.display = "none";

    addMessage("koda", `<p>Hi, I'm <strong>KODA</strong> — the Kansas Overdose Data Assistant, built by the CDC Foundation's Overdose Response Strategy program.</p>
<p>I have county-level overdose surveillance data for all 105 Kansas counties — including EMS incidents, emergency department visits, fatal overdoses, naloxone distribution, drug trends, spike events, and more. I can compare any county to the Kansas state average and help you think through what the data means for your community.</p>
<p>Tell me which county or city you're working in and what you'd like to understand. You can ask me anything — from "what does our meth trend look like?" to "we want to expand naloxone distribution, what does our data say?"</p>`);

    addChips(["I'm from Reno County and want an overview","I'm from Wichita — tell me about opioid trends","I'm from Wyandotte County — what's our drug ecosystem?","I'm from Hutchinson and want to know about meth","What counties have the highest overdose burden?"]);

  } catch(e) {
    document.getElementById("loading-screen").innerHTML = `
      <div class="logo">KODA</div>
      <div class="load-msg" style="color:#f87171">Error loading data: ${e.message}</div>
      <div class="load-msg">Please refresh the page to try again.</div>`;
  }
}

init();
</script>
